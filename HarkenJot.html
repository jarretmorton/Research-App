    // Media View Component
    const MediaView = React.forwardRef(({ currentSource, setCurrentSource, addSource, updateSource, addNote, notes, sources, showToast, setActiveTab, carMode, setCarMode, isMobileDevice, pendingNotebookLMModal, setPendingNotebookLMModal, checkDuplicateBeforeLoad }, ref) => {
      const [url, setUrl] = useState('');
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [isRecording, setIsRecording] = useState(false);
      const [videoId, setVideoId] = useState(null);
      const [podcastAudio, setPodcastAudio] = useState(null); // { audioUrl, title, showName, artworkUrl, link }
      const [needsFileRelink, setNeedsFileRelink] = useState(false);
      const [isLoadingPodcast, setIsLoadingPodcast] = useState(false);
      const [speechReady, setSpeechReady] = useState(false);
      const [useWhisperFallback, setUseWhisperFallback] = useState(false);
      const [whisperLoading, setWhisperLoading] = useState(false);
      const [whisperProgress, setWhisperProgress] = useState(0);
      const [isTranscribing, setIsTranscribing] = useState(false);
      const [showTextNote, setShowTextNote] = useState(false);
      const [textNote, setTextNote] = useState('');
      const [speed, setSpeed] = useState(1);
      const [artworkFailed, setArtworkFailed] = useState(false);
      const [isLoadingArtwork, setIsLoadingArtwork] = useState(false);
      const [showNotebookLMModal, setShowNotebookLMModal] = useState(false);
      const [notebookLMStep, setNotebookLMStep] = useState('ask');
      const [xVideo, setXVideo] = useState(null); // { id, embedUrl, type: 'broadcast'|'tweet' }

      // When a local file is loaded, App sets pendingNotebookLMModal=true and changes currentSource,
      // which causes MediaView to remount (key prop). This effect fires on mount and shows the modal.
      useEffect(() => {
        if (pendingNotebookLMModal) {
          setPendingNotebookLMModal(false);
          setNotebookLMStep('ask');
          setShowNotebookLMModal(true);
        }
      }, []);

      const playerRef = useRef(null);
      const audioPlayerRef = useRef(null); // HTML5 audio element for podcasts
      const videoPlayerRef = useRef(null); // HTML5 video element for X.com tweet videos
      const activeBlobUrlsRef = useRef(new Set()); // Blob URLs created this session (valid for re-link detection)
      const mediaRecorderRef = useRef(null);
      const streamRef = useRef(null);
      const intervalRef = useRef(null);
      const isStartingRecordingRef = useRef(false);
      const lastInitializedSourceRef = useRef(null); // Track last initialized source to prevent re-init loops
      const wasPlayingRef = useRef(false);

      // Expose seekTo method to parent
      useImperativeHandle(ref, () => ({
        seekTo: (timestamp) => {
          if (playerRef.current) {
            playerRef.current.seekTo(timestamp, true);
          } else if (videoPlayerRef.current) {
            videoPlayerRef.current.currentTime = timestamp;
          } else if (audioPlayerRef.current) {
            audioPlayerRef.current.currentTime = timestamp;
          } else if (xVideo) {
            // Iframe fallback (broadcasts) can't be seeked; update the timer so the note timestamp aligns
            setCurrentTime(timestamp);
          }
        }
      }));
      const wakeLockRef = useRef(null);
      const audioContextRef = useRef(null);
      const analyzerRef = useRef(null);
      const silenceTimeoutRef = useRef(null);
      const webSpeechSilenceTimerRef = useRef(null);
      const intentionalStopRef = useRef(false);
      const isProcessing = isRecording || isTranscribing || whisperLoading;

      // Load currentSource into player when source is selected from library
      useEffect(() => {
        if (currentSource && currentSource.type === 'youtube' && currentSource.videoId) {
          // Skip if we already initialized for this source (prevents loop when updateSource updates currentSource)
          if (lastInitializedSourceRef.current === currentSource.id) {
            return;
          }
          lastInitializedSourceRef.current = currentSource.id;

          setVideoId(currentSource.videoId);
          setPodcastAudio(null);
          setXVideo(null);
          setSpeed(currentSource.speed || 1);
          // Don't set URL - keep input clear after loading
          // Initialize player after state update
          setTimeout(() => {
            if (window.YT && window.YT.Player) {
              initPlayer(currentSource.videoId, currentSource.id);
            } else {
              window.onYouTubeIframeAPIReady = () => initPlayer(currentSource.videoId, currentSource.id);
            }
          }, 100);
        } else if (currentSource && currentSource.type === 'podcast') {
          // Skip if we already initialized for this source (prevents loop when updateSource updates currentSource)
          if (lastInitializedSourceRef.current === currentSource.id) {
            return;
          }
          lastInitializedSourceRef.current = currentSource.id;

          // Check if audioUrl is missing (older sources might not have it)
          if (!currentSource.audioUrl) {
            if (currentSource.localFile) {
              // Local files use data URLs that aren't persisted — show relink banner
              setVideoId(null);
              setArtworkFailed(false);
              setNeedsFileRelink(true);
              setPodcastAudio({ audioUrl: '', title: currentSource.title, showName: '', artworkUrl: currentSource.artworkUrl || '', link: '' });
            } else {
              showToast('This podcast is missing its audio URL - please re-add it from the original link');
              setVideoId(null);
              setPodcastAudio(null);
            }
            return;
          }

          setVideoId(null);
          setXVideo(null);
          setArtworkFailed(false);
          setNeedsFileRelink(false);
          setPodcastAudio({
            audioUrl: currentSource.audioUrl,
            title: currentSource.title,
            showName: currentSource.showName || '',
            artworkUrl: currentSource.artworkUrl || '',
            link: currentSource.link || currentSource.url
          });
          setSpeed(currentSource.speed || 1);
          // Don't set URL - keep input clear after loading
          // Restore saved position after audio loads
          setTimeout(() => {
            if (audioPlayerRef.current) {
              const savedPositions = HJStore.get('media_positions') || {};
              const savedPosition = savedPositions[currentSource.id];
              if (savedPosition) {
                audioPlayerRef.current.currentTime = savedPosition;
              }
            }
          }, 500);
        } else if (currentSource && currentSource.type === 'xvideo') {
          if (lastInitializedSourceRef.current === currentSource.id) return;
          lastInitializedSourceRef.current = currentSource.id;
          setVideoId(null);
          setPodcastAudio(null);
          setIsPlaying(false);
          setCurrentTime(0);
          setDuration(0);
          setXVideo({
            id: currentSource.xVideoId,
            embedUrl: currentSource.embedUrl,
            type: currentSource.xVideoType || 'broadcast',
            mp4Url: null
          });
          // Re-fetch MP4 URL for tweets (twimg URLs are signed and may rotate)
          if (currentSource.xVideoType === 'tweet' && currentSource.xVideoId) {

            fetchXTweetVideoUrl(currentSource.xVideoId).then(mp4Url => {
              if (mp4Url && lastInitializedSourceRef.current === sourceId) {

            });
          }
        } else {
          // Reset the ref when switching to a different type or no source
          lastInitializedSourceRef.current = null;

      // Check if Web Speech API is ready
      useEffect(() => {
        if (window.WebSpeechAPI?.isSupported) {
          setSpeechReady(true);

            setUseWhisperFallback(true);
            console.log('MediaView: Using Whisper fallback due to previous network errors');

          console.log('MediaView: Web Speech API not supported, Whisper fallback available');
          setSpeechReady(true);
          setUseWhisperFallback(true);

      }, []);

      // Initialize YouTube API
      useEffect(() => {
        if (!window.YT) {

      }, []);

      // Apply playback speed to YouTube and audio players
      useEffect(() => {
        if (playerRef.current && playerRef.current.setPlaybackRate) {

        }
        if (audioPlayerRef.current) {
          audioPlayerRef.current.playbackRate = speed;
        }
        if (videoPlayerRef.current) {
          videoPlayerRef.current.playbackRate = speed;
        }
      }, [speed]);

      // Save speed to source when it changes
      useEffect(() => {
        if (currentSource?.id && speed !== 1) {
          updateSource(currentSource.id, { speed: speed });
        }
      }, [speed, currentSource?.id]);

      // Save position whenever it changes (for YouTube, podcast, and X.com timer)
      useEffect(() => {
        if (currentSource?.id && (videoId || podcastAudio || xVideo) && currentTime > 0) {
          const savedPositions = HJStore.get('media_positions') || {};
          savedPositions[currentSource.id] = currentTime;
          HJStore.set('media_positions', savedPositions).catch((e) => console.error('Failed to save media position:', e));
        }
      }, [currentTime, currentSource?.id, videoId, podcastAudio, xVideo]);

      // YouTube audio continues playing in background tabs natively (same as podcasts).
      // No visibilitychange pause handler needed.

      // Track playing state before car mode changes (but not during recording)
      useEffect(() => {
        if (!isRecording && !isTranscribing) {
          wasPlayingRef.current = isPlaying;
        }
      }, [isPlaying, isRecording, isTranscribing]);

      // Media Session API for Android Auto / lock screen controls (podcasts and YouTube)
      useEffect(() => {
        if (!('mediaSession' in navigator)) return;

        // Set up action handlers based on current media type
        if (podcastAudio) {
          // Podcast: Use HTML5 audio element
          MediaSessionManager.setActionHandlers({
            onPlay: () => audioPlayerRef.current?.play(),
            onPause: () => audioPlayerRef.current?.pause(),
            onSeekBackward: null,
            onSeekForward: null,
            onPreviousTrack: null,
            onNextTrack: null
          });

          // Set metadata
          MediaSessionManager.setMetadata({
            title: podcastAudio.title || 'Podcast',
            artist: podcastAudio.showName || 'HarkenJot',
            album: 'Podcast',
            artwork: podcastAudio.artworkUrl || null
          });
        } else if (videoId && playerRef.current) {
          // YouTube: Use YouTube player
          MediaSessionManager.setActionHandlers({
            onPlay: () => playerRef.current?.playVideo(),
            onPause: () => playerRef.current?.pauseVideo(),
            onSeekBackward: null,
            onSeekForward: null,
            onPreviousTrack: null,
            onNextTrack: null
          });

          // Set metadata for YouTube
          MediaSessionManager.setMetadata({
            title: currentSource?.title || 'YouTube Video',
            artist: 'YouTube',
            album: 'HarkenJot',
            artwork: currentSource?.thumbnail || null
          });
        } else if (xVideo) {
          // X.com: control the native <video> element when we have an MP4,
          // otherwise fall back to timer-based state for iframe embeds
          MediaSessionManager.setActionHandlers({
            onPlay: () => {
              if (videoPlayerRef.current) videoPlayerRef.current.play();
              else { setIsPlaying(true); requestWakeLock(); }
            },
            onPause: () => {
              if (videoPlayerRef.current) videoPlayerRef.current.pause();
              else { setIsPlaying(false); releaseWakeLock(); }
            },
            onSeekBackward: null,
            onSeekForward: null,
            onPreviousTrack: null,
            onNextTrack: null
          });

          MediaSessionManager.setMetadata({
            title: currentSource?.title || 'X Video',
            artist: currentSource?.channelName || 'X',
            album: 'HarkenJot',
            artwork: null
          });

      useEffect(() => {

      // frame whose media session overrides our parent-frame setPlaybackState()

      // an explicit audio anchor, so the browser derives play/pause button state
      // from it natively (same mechanism as podcast <audio>).
      useEffect(() => {

          const silentAudio = MediaSessionManager.initSilentAudio();
          silentAudio.play().catch(err => console.log('Silent audio play error:', err));

            position: currentTime,
            playbackRate: speed

      useEffect(() => {

        }
        return () => clearInterval(intervalRef.current);
      }, [isPlaying, xVideo]);

      const extractVideoId = (url) => {
        const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
        return match ? match[1] : null;
      };

      const extractXVideoInfo = (url) => {
        // Broadcast: x.com/i/broadcasts/{id}  or  twitter.com/i/broadcasts/{id}
        const broadcastMatch = url.match(/(?:x\.com|twitter\.com)\/i\/broadcasts\/([a-zA-Z0-9]+)/);
        if (broadcastMatch) return { type: 'broadcast', id: broadcastMatch[1] };
        // Tweet with video: x.com/{user}/status/{id}
        const tweetMatch = url.match(/(?:x\.com|twitter\.com)\/(?:#!\/)?(\w+)\/status(?:es)?\/(\d+)/);
        if (tweetMatch) return { type: 'tweet', id: tweetMatch[2], username: tweetMatch[1] };

      };

      // Fetch the direct MP4 URL for a tweet via Twitter's syndication endpoint
      // (the same one their embed widget uses internally). Returns null if the
      // tweet has no video or the request fails. The endpoint doesn't always
      // send permissive CORS headers, so we fall back through CORS proxies.
      const fetchXTweetVideoUrl = async (tweetId) => {
        try {
          const token = ((Number(tweetId) / 1e15) * Math.PI).toString(36).replace(/(0+|\.)/g, '');
          const endpoint = `https://cdn.syndication.twimg.com/tweet-result?id=${tweetId}&token=${token}&lang=en`;
          const transports = [
            (u) => u,
            (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
            (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
            (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
          ];
          let data = null;
          for (const wrap of transports) {
            try {
              const response = await fetch(wrap(endpoint));
              if (!response.ok) continue;
              data = await response.json();
              if (data) break;
            } catch (err) {
              // try next transport
            }
          }
          if (!data) {
            console.log('X syndication fetch failed for tweet', tweetId);
            return null;
          }
          // Video may live on the tweet itself, on a quoted tweet, or on a card
          const candidates = [data, data.quoted_tweet].filter(Boolean);
          for (const candidate of candidates) {
            const media = (candidate.mediaDetails || []).find(m => m?.video_info?.variants);
            if (!media) continue;
            const mp4 = media.video_info.variants
              .filter(v => v.content_type === 'video/mp4' && v.bitrate)
              .sort((a, b) => b.bitrate - a.bitrate)[0];
            if (mp4?.url) return mp4.url;
          }
          console.log('X syndication: no video variants found for tweet', tweetId, data);
          return null;
        } catch (err) {
          console.log('Could not fetch X.com video URL:', err);
          return null;
        }
      };

      // Detect URL type based on the actual URL
      const detectUrlType = (url) => {
        const lowerUrl = url.toLowerCase();
        // YouTube URLs
        if (lowerUrl.includes('youtube.com') || lowerUrl.includes('youtu.be')) {
          return 'youtube';
        }
        // Spotify URLs (will be converted to RSS)
        if (lowerUrl.includes('open.spotify.com') || lowerUrl.includes('spotify.com')) {
          return 'spotify';
        }
        // Direct audio file URLs
        if (lowerUrl.match(/\.(mp3|m4a|ogg|wav|aac)(\?|$)/)) {
          return 'audio';
        }
        // RSS feed URLs - match common patterns and podcast hosting domains
        if (lowerUrl.includes('.xml') || lowerUrl.includes('/rss') || lowerUrl.includes('/feed') ||
            lowerUrl.match(/\b(feeds?|rss)\./i) || lowerUrl.includes('anchor.fm') ||
            lowerUrl.includes('podcastfeeds.') || lowerUrl.includes('megaphone.fm') ||
            lowerUrl.includes('omnycontent.com') || lowerUrl.includes('podbean.com') ||
            lowerUrl.includes('acast.com') || lowerUrl.includes('buzzsprout.com') ||
            lowerUrl.includes('simplecast.com') || lowerUrl.includes('libsyn.com') ||
            lowerUrl.includes('spreaker.com') || lowerUrl.includes('podomatic.com') ||
            lowerUrl.includes('art19.com') || lowerUrl.includes('transistor.fm') ||
            lowerUrl.includes('captivate.fm') || lowerUrl.includes('redcircle.com') ||
            lowerUrl.includes('audioboom.com') || lowerUrl.includes('pcdn.co') ||
            lowerUrl.includes('podcasts.apple.com') || lowerUrl.includes('podtrac.com')) {
          return 'rss';
        }
        // X.com / Twitter video or broadcast URLs
        if (lowerUrl.includes('x.com') || lowerUrl.includes('twitter.com')) {
          return 'xvideo';
        }
        return null;
      };

      // Fetch Spotify metadata using oEmbed API
      const fetchSpotifyMetadata = async (spotifyUrl) => {
        try {
          const oembedUrl = `https://open.spotify.com/oembed?url=${encodeURIComponent(spotifyUrl)}`;
          const response = await fetch(oembedUrl);
          if (!response.ok) throw new Error('Failed to fetch Spotify metadata');
          const data = await response.json();

          // Extract show name from title using common separators
          // oEmbed title may be "Show Name - Episode Title", "Episode Title", or other formats
          let showName = data.title;
          let separatorFound = false;
          if (data.provider_name === 'Spotify') {
            const separators = [' - ', ' — ', ' – ', ' | '];
            for (const sep of separators) {
              if (data.title.includes(sep)) {
                showName = data.title.split(sep)[0].trim();
                separatorFound = true;
                break;
              }
            }
          } else {
            showName = data.provider_name;
            separatorFound = true;
          }

          return {
            title: data.title,
            showName: showName,
            thumbnailUrl: data.thumbnail_url,
            // Flag callers that the show name is just the episode title (no
            // separator), so they can attempt a more reliable lookup.
            showNameUncertain: !separatorFound
          };
        } catch (error) {
          console.error('Spotify oEmbed error:', error);
          return null;
        }
      };

      // Scrape the Spotify episode page for reliable show/episode metadata.
      // Spotify's oEmbed often returns just the episode title, leaving us with
      // no real show name to look up on iTunes. The episode page itself embeds
      // JSON-LD with `partOfSeries.name` (the show) and `name` (the episode),
      // which is far more reliable. Falls back to og:description parsing.
      const fetchSpotifyPageMetadata = async (spotifyUrl) => {
        const proxies = [
          (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
          (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
          (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
          (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`
        ];

        for (let i = 0; i < proxies.length; i++) {
          try {
            const response = await fetch(proxies[i](spotifyUrl));
            if (!response.ok) continue;
            let html = await response.text();
            // allorigins/get returns JSON {contents}
            if (i === proxies.length - 1) {
              try { html = JSON.parse(html).contents || ''; } catch { html = ''; }
            }
            if (!html || html.length < 200) continue;

            const doc = new DOMParser().parseFromString(html, 'text/html');
            let episodeTitle = null;
            let showName = null;

            // JSON-LD: most reliable source
            const jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
            for (const script of jsonLdScripts) {
              try {
                const data = JSON.parse(script.textContent);
                const items = Array.isArray(data) ? data : [data];
                for (const item of items) {
                  const t = item['@type'];
                  const isEpisode = Array.isArray(t)
                    ? t.some(x => /Episode/i.test(x))
                    : /Episode/i.test(t || '');
                  if (isEpisode || item.partOfSeries) {
                    episodeTitle = item.name || episodeTitle;
                    showName = item.partOfSeries?.name || showName;
                  }
                  if (showName) break;
                }
              } catch (e) { /* skip malformed JSON-LD */ }
              if (showName) break;
            }

            // Fallback: og tags + description parsing
            if (!episodeTitle) {
              episodeTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || null;
            }
            if (!showName) {
              const desc = doc.querySelector('meta[property="og:description"]')?.getAttribute('content') || '';
              // "Listen to this episode from <SHOW> on Spotify."
              let m = desc.match(/from\s+(.+?)\s+on\s+Spotify/i);
              if (m) showName = m[1].trim();
              // "Episode · <SHOW> · <duration>"
              if (!showName) {
                m = desc.match(/Episode[^·]*·\s*([^·]+?)\s*(?:·|$)/i);
                if (m) showName = m[1].trim();
              }
            }

            if (showName || episodeTitle) {
              return { episodeTitle, showName };
            }
          } catch (e) { continue; }
        }
        return null;
      };

      // Search for RSS feed using podcast name
      const searchForRSSFeed = async (showName, episodeTitle) => {
        const normalizeForMatch = (t) => t.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();

        try {
          // Strategy 1: Search iTunes for the episode directly (most reliable)
          if (episodeTitle) {
            try {
              const episodeQuery = encodeURIComponent(episodeTitle);
              const episodeResponse = await fetch(`https://itunes.apple.com/search?term=${episodeQuery}&entity=podcastEpisode&limit=10`);
              if (episodeResponse.ok) {
                const episodeData = await episodeResponse.json();
                if (episodeData.results && episodeData.results.length > 0) {
                  const targetNorm = normalizeForMatch(episodeTitle);
                  let bestResult = null;
                  let bestScore = -1;

                  for (const result of episodeData.results) {
                    if (!result.feedUrl) continue;
                    const resultNorm = normalizeForMatch(result.trackName || '');
                    let score = 0;
                    if (resultNorm === targetNorm) score = 100;
                    else if (resultNorm.includes(targetNorm) || targetNorm.includes(resultNorm)) score = 80;
                    else {
                      const targetWords = targetNorm.split(/\s+/).filter(w => w.length > 3);
                      targetWords.forEach(word => {
                        if (resultNorm.includes(word)) score += 10;
                      });
                    }
                    if (score > bestScore) {
                      bestScore = score;
                      bestResult = result;
                    }
                  }

                  if (bestResult && bestScore > 0) {
                    return {
                      feedUrl: bestResult.feedUrl,
                      podcastName: bestResult.collectionName,
                      artworkUrl: bestResult.artworkUrl600 || bestResult.artworkUrl100
                    };
                  }
                }
              }
            } catch (e) {
              console.log('Episode-level iTunes search failed, trying show search:', e);
            }
          }

          // Strategy 2: Search by show name (original approach, fallback)
          const searchQuery = encodeURIComponent(showName);
          const response = await fetch(`https://itunes.apple.com/search?term=${searchQuery}&media=podcast&limit=5`);
          if (!response.ok) throw new Error('iTunes search failed');
          const data = await response.json();

          if (data.results && data.results.length > 0) {
            return {
              feedUrl: data.results[0].feedUrl,
              podcastName: data.results[0].collectionName,
              artworkUrl: data.results[0].artworkUrl600 || data.results[0].artworkUrl100
            };
          }
          return null;
        } catch (error) {
          console.error('RSS search error:', error);
          return null;
        }
      };

      // Fetch cover art for a podcast using iTunes search
      const fetchCoverArt = async () => {
        if (!podcastAudio) return;

        setIsLoadingArtwork(true);
        const searchTerm = podcastAudio.showName || podcastAudio.title;

        try {
          const searchQuery = encodeURIComponent(searchTerm);
          const response = await fetch(`https://itunes.apple.com/search?term=${searchQuery}&media=podcast&limit=5`);
          if (!response.ok) throw new Error('iTunes search failed');
          const data = await response.json();

          if (data.results && data.results.length > 0) {
            const artworkUrl = data.results[0].artworkUrl600 || data.results[0].artworkUrl100;
            if (artworkUrl) {
              // Update local state
              setPodcastAudio(prev => ({ ...prev, artworkUrl }));
              setArtworkFailed(false);
              // Update stored source
              if (currentSource?.id) {
                updateSource(currentSource.id, { artworkUrl });
              }
              showToast('Cover art loaded');
            } else {
              showToast('No cover art found');
              setArtworkFailed(true);
            }
          } else {
            showToast('Could not find podcast artwork');
            setArtworkFailed(true);
          }
        } catch (error) {
          console.error('Artwork fetch error:', error);
          showToast('Failed to load cover art');
          setArtworkFailed(true);
        }

        setIsLoadingArtwork(false);
      };

      // Parse RSS feed and find episode
      const parseRSSAndFindEpisode = async (feedUrl, episodeTitle) => {
        // Try direct fetch first (some feeds support CORS), then CORS proxies.
        // Substack-hosted feeds (api.substack.com/feed/podcast/*.rss, used by
        // Latent Space and other Substack podcasts) intermittently fail through
        // a single proxy, so we try several formats including allorigins's JSON
        // wrapper which often succeeds when /raw is rate-limited.
        const fetchStrategies = [
          { build: (u) => u, extract: (t) => t },
          { build: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, extract: (t) => t },
          { build: (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`, extract: (t) => t },
          { build: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, extract: (t) => t },
          {
            build: (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
            extract: (t) => { try { return JSON.parse(t).contents || ''; } catch { return ''; } }
          }
        ];

        const isXmlFeed = (text) => text && (text.includes('<channel') || text.includes('<feed') || text.trimStart().startsWith('<?xml'));

        let xmlText = null;
        for (const strategy of fetchStrategies) {
          try {
            const response = await fetch(strategy.build(feedUrl));
            if (response.ok) {
              const raw = await response.text();
              const text = strategy.extract(raw);
              if (isXmlFeed(text)) {
                xmlText = text;
                break;
              }
              console.log('CORS proxy returned non-XML response, trying next...');
            }
          } catch (e) {
            continue;
          }
        }

        if (!xmlText) {
          console.error('All fetch strategies failed for RSS feed:', feedUrl);
          return null;
        }

        try {
          const parser = new DOMParser();
          const xml = parser.parseFromString(xmlText, 'text/xml');

          // Check for XML parse errors
          const parseError = xml.querySelector('parsererror');
          if (parseError) {
            console.error('XML parse error:', parseError.textContent);
            return null;
          }

          const items = xml.querySelectorAll('item');

          // Extract channel info
          const channel = xml.querySelector('channel');
          const channelTitle = channel?.querySelector(':scope > title')?.textContent || '';
          const itunesImage = channel?.getElementsByTagName('itunes:image')[0];
          const channelArtwork = itunesImage?.getAttribute('href') ||
                                 channel?.querySelector('image url')?.textContent || '';

          // Helper to extract audio URL from an item (check enclosure and media:content)
          const getAudioUrl = (item) => {
            const enclosure = item.querySelector('enclosure');
            const enclosureUrl = enclosure?.getAttribute('url');
            if (enclosureUrl) return enclosureUrl;

            // Fallback: check media:content elements for audio
            const mediaContents = item.getElementsByTagName('media:content');
            for (const mc of mediaContents) {
              const mcUrl = mc.getAttribute('url');
              const mcType = mc.getAttribute('type') || '';
              if (mcUrl && (mcType.startsWith('audio/') || mcUrl.match(/\.(mp3|m4a|ogg|aac|wav)(\?|$)/i))) {
                return mcUrl;
              }
            }
            return null;
          };

          // Try to find matching episode by title
          let bestMatch = null;
          let bestScore = 0;

          // Keep spaces for word-level matching
          const normalizeTitle = (t) => t.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
          const targetTitle = normalizeTitle(episodeTitle);

          items.forEach((item, index) => {
            const title = item.querySelector('title')?.textContent || '';
            const audioUrl = getAudioUrl(item);

            if (audioUrl) {
              // Score based on title similarity
              const itemTitle = normalizeTitle(title);
              let score = 0;

              // Check for substring match (using stripped versions for robustness)
              const targetStripped = targetTitle.replace(/\s/g, '');
              const itemStripped = itemTitle.replace(/\s/g, '');
              if (itemStripped.includes(targetStripped) || targetStripped.includes(itemStripped)) {
                score = 100;
              } else {
                // Count matching words (now works correctly since spaces are preserved)
                const targetWords = targetTitle.split(/\s+/);
                targetWords.forEach(word => {
                  if (word.length > 3 && itemTitle.includes(word)) score += 10;
                });
              }

              // Prefer first match if scores are equal (usually most recent)
              if (score > bestScore || (score === bestScore && !bestMatch)) {
                bestScore = score;

                const description = item.querySelector('description')?.textContent || '';

                bestMatch = {
                  title: title,
                  audioUrl: audioUrl,
                  description: description,
                  artworkUrl: channelArtwork,
                  channelTitle: channelTitle,
                  pubDate: item.querySelector('pubDate')?.textContent || '',
                  link: item.querySelector('link')?.textContent || ''
                };
              }
            }
          });

          // If no good match, return first episode with audio
          if (!bestMatch && items.length > 0) {
            for (const item of items) {
              const audioUrl = getAudioUrl(item);
              if (audioUrl) {
                const description = item.querySelector('description')?.textContent || '';
                bestMatch = {
                  title: item.querySelector('title')?.textContent || 'Unknown Episode',
                  audioUrl: audioUrl,
                  description: description,
                  artworkUrl: channelArtwork,
                  channelTitle: channelTitle,
                  pubDate: item.querySelector('pubDate')?.textContent || '',
                  link: item.querySelector('link')?.textContent || ''
                };
                break;
              }
            }
          }

          if (!bestMatch) {
            console.error(`RSS feed parsed but no episodes with audio found (${items.length} items in feed)`);
          }

          return bestMatch;
        } catch (error) {
          console.error('RSS parse error:', error);
          return null;
        }
      };

      // Load podcast from Spotify URL
      const loadPodcastFromSpotify = async () => {
        setIsLoadingPodcast(true);
        showToast('Searching for podcast feed...');

        try {
          // Extract timestamp from Spotify URL (e.g., t=758 means 758 seconds)
          let startTime = null;
          try {
            const urlObj = new URL(url);
            const t = urlObj.searchParams.get('t');
            if (t) startTime = parseInt(t, 10);
          } catch (e) { /* ignore URL parse errors */ }

          // Step 1: Get Spotify metadata via oEmbed
          let metadata = await fetchSpotifyMetadata(url);

          // Step 1b: If oEmbed gave us no usable show name (e.g. for Latent
          // Space and many other modern podcasts where the oEmbed title is
          // just the episode title), scrape the Spotify episode page for
          // reliable show metadata via JSON-LD.
          if (!metadata || metadata.showNameUncertain) {
            showToast('Looking up show details...');
            const pageMeta = await fetchSpotifyPageMetadata(url);
            if (pageMeta && pageMeta.showName) {
              metadata = {
                title: pageMeta.episodeTitle || metadata?.title || pageMeta.showName,
                showName: pageMeta.showName,
                thumbnailUrl: metadata?.thumbnailUrl,
                showNameUncertain: false
              };
            }
          }

          if (!metadata) {
            showToast('Could not fetch Spotify metadata - try pasting the RSS feed URL instead');
            setIsLoadingPodcast(false);
            return;
          }

          showToast(`Found: ${metadata.title}`);

          // Step 2: Search for RSS feed
          const rssInfo = await searchForRSSFeed(metadata.showName, metadata.title);
          if (!rssInfo) {
            showToast('Could not find RSS feed for this podcast - try pasting the RSS feed URL instead');
            setIsLoadingPodcast(false);
            return;
          }

          showToast(`Found feed: ${rssInfo.podcastName}`);

          // Step 3: Parse RSS and find episode
          const episode = await parseRSSAndFindEpisode(rssInfo.feedUrl, metadata.title);
          if (!episode) {
            // Show feed URL so user can try loading it directly as RSS
            console.log('Failed feed URL:', rssInfo.feedUrl);
            setUrl(rssInfo.feedUrl);
            showToast('Could not find episode — feed URL pasted, try loading it directly');
            setIsLoadingPodcast(false);
            return;
          }

          // Success! Load the audio
          setVideoId(null);
          setXVideo(null);
          setArtworkFailed(false);
          setPodcastAudio({
            audioUrl: episode.audioUrl,
            title: episode.title,
            showName: rssInfo.podcastName,
            artworkUrl: rssInfo.artworkUrl,
            link: episode.link || url
          });

          const newSource = addSource({
            type: 'podcast',
            title: episode.title,
            url: url,
            audioUrl: episode.audioUrl,
            showName: rssInfo.podcastName,
            artworkUrl: rssInfo.artworkUrl,
            link: episode.link || url
          });

          // Save start timestamp so position restore picks it up
          if (startTime && newSource) {
            const savedPositions = HJStore.get('media_positions') || {};
            savedPositions[newSource.id] = startTime;
            HJStore.set('media_positions', savedPositions).catch(() => { /* best-effort */ });
          }

          setUrl(''); // Clear URL after successful load
          showToast('Podcast loaded!');
        } catch (error) {
          console.error('Podcast loading error:', error);
          showToast('Failed to load podcast');
        }

        setIsLoadingPodcast(false);
      };

      // Load direct RSS feed
      const loadRSSFeed = async (feedUrl) => {
        setIsLoadingPodcast(true);
        showToast('Loading RSS feed...');

        try {
          const episode = await parseRSSAndFindEpisode(feedUrl, '');
          if (!episode) {
            showToast('Could not find episodes in RSS feed');
            setIsLoadingPodcast(false);
            return;
          }

          const showName = episode.channelTitle || 'Podcast';

          setVideoId(null);
          setXVideo(null);
          setArtworkFailed(false);
          setPodcastAudio({
            audioUrl: episode.audioUrl,
            title: episode.title,
            showName: showName,
            artworkUrl: episode.artworkUrl || '',
            link: episode.link || feedUrl
          });

          addSource({
            type: 'podcast',
            title: episode.title,
            url: feedUrl,
            audioUrl: episode.audioUrl,
            showName: showName,
            artworkUrl: episode.artworkUrl || '',
            link: episode.link || feedUrl
          });

          setUrl(''); // Clear URL after successful load
          showToast('Podcast loaded!');
        } catch (error) {
          showToast('Failed to load RSS feed');
        }

        setIsLoadingPodcast(false);
      };

      // Detect actual audio format by reading file magic bytes (first 12 bytes)
      // File extensions can lie (e.g. NotebookLM exports WAV with .m4a extension)
      const detectAudioMimeType = async (file) => {
        try {
          const header = new Uint8Array(await file.slice(0, 12).arrayBuffer());
          const match = (offset, bytes) => bytes.every((b, i) => header[offset + i] === b);
          // WAV: RIFF....WAVE
          if (match(0, [0x52, 0x49, 0x46, 0x46]) && match(8, [0x57, 0x41, 0x56, 0x45])) return 'audio/wav';
          // OGG: OggS
          if (match(0, [0x4F, 0x67, 0x67, 0x53])) return 'audio/ogg';
          // FLAC: fLaC
          if (match(0, [0x66, 0x4C, 0x61, 0x43])) return 'audio/flac';
          // WebM: EBML header
          if (match(0, [0x1A, 0x45, 0xDF, 0xA3])) return 'audio/webm';
          // M4A/MP4: ftyp box at offset 4
          if (match(4, [0x66, 0x74, 0x79, 0x70])) return 'audio/mp4';
          // MP3: ID3v2 tag
          if (match(0, [0x49, 0x44, 0x33])) return 'audio/mpeg';
          // MP3/AAC: frame sync (0xFF with upper bits set)
          if (header[0] === 0xFF && (header[1] & 0xE0) === 0xE0) return 'audio/mpeg';
        } catch (e) { /* fall through to extension-based detection */ }
        // Fallback: map by extension
        const ext = file.name.split('.').pop().toLowerCase();
        const extMap = { m4a: 'audio/mp4', m4b: 'audio/mp4', aac: 'audio/aac', mp3: 'audio/mpeg', ogg: 'audio/ogg', wav: 'audio/wav', webm: 'audio/webm', flac: 'audio/flac' };
        return extMap[ext] || file.type || 'application/octet-stream';
      };

      // Process a local audio file for playback using MediaSource Extensions (MSE).
      // Mobile Android Chrome/Edge rejects regular blob URLs for audio with
      // MEDIA_ERR_SRC_NOT_SUPPORTED. MSE feeds audio data through the browser's
      // streaming media pipeline, which mobile browsers fully support (it's how
      // YouTube/Spotify web work on mobile). Falls back to regular blob URL on
      // browsers without MSE support.
      const processLocalAudioFile = async (file) => {
        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);

        // Rewrite MPEG-DASH ftyp brand ('dash' → 'isom') for broader compatibility.
        // NotebookLM exports MP4 audio with ftypdash brand which some decoders reject.
        if (bytes.length > 11 &&
            bytes[4] === 0x66 && bytes[5] === 0x74 && bytes[6] === 0x79 && bytes[7] === 0x70 &&
            bytes[8] === 0x64 && bytes[9] === 0x61 && bytes[10] === 0x73 && bytes[11] === 0x68) {
          bytes[8]  = 0x69; // i
          bytes[9]  = 0x73; // s
          bytes[10] = 0x6F; // o
          bytes[11] = 0x6D; // m
        }

        // Try MSE — the standard way mobile browsers handle MP4 audio/video
        if (window.MediaSource) {
          const codecs = [
            'audio/mp4; codecs="mp4a.40.2"',  // AAC-LC (most common)
            'audio/mp4; codecs="mp4a.40.5"',  // HE-AAC v1
            'audio/mp4; codecs="mp4a.40.29"', // HE-AAC v2
          ];
          const mimeCodec = codecs.find(c => MediaSource.isTypeSupported(c));

          if (mimeCodec) {
            const mediaSource = new MediaSource();
            const url = URL.createObjectURL(mediaSource);

            mediaSource.addEventListener('sourceopen', () => {
              try {
                const sourceBuffer = mediaSource.addSourceBuffer(mimeCodec);
                sourceBuffer.appendBuffer(buffer);
                sourceBuffer.addEventListener('updateend', () => {
                  try {
                    if (mediaSource.readyState === 'open') {
                      mediaSource.endOfStream();
                    }
                  } catch (e) {
                    console.warn('MSE endOfStream error:', e);
                  }
                });
              } catch (e) {
                console.warn('MSE SourceBuffer error:', e);
              }
            });

            return url;
          }
        }

        // Fallback: regular blob URL (works on desktop, may fail on mobile)
        const mimeType = await detectAudioMimeType(file);
        const blob = new Blob([buffer], { type: mimeType });
        return URL.createObjectURL(blob);
      };

      const handleConfirmNotebookLM = () => {
        if (currentSource) {
          updateSource(currentSource.id, { isNotebookLM: true });
        }
      };

      const handleSaveNotebookLMUrl = (notebookLMUrl) => {
        if (currentSource && notebookLMUrl) {
          updateSource(currentSource.id, { notebookLMUrl });
          showToast('NotebookLM link saved');
        }
      };

      const handleLinkSource = (linkedSourceId) => {
        if (currentSource) {
          updateSource(currentSource.id, { linkedSourceId });
        }
        showToast('Linked to article');
      };

      const loadLocalAudioFile = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'audio/*,.m4a,.m4b,.aac';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          // Check before MSE/blob processing so we don't burn CPU on a duplicate.
          if (!await checkDuplicateBeforeLoad({ type: 'podcast', localFile: true, fileName: file.name })) {
            return;
          }
          const blobUrl = await processLocalAudioFile(file);
          const title = file.name.replace(/\.[^.]+$/, '');
          setVideoId(null);
          setXVideo(null);
          setArtworkFailed(false);
          setPodcastAudio({ audioUrl: blobUrl, title, showName: '', artworkUrl: '', link: '' });
          activeBlobUrlsRef.current.add(blobUrl);
          const newSource = addSource({
            type: 'podcast',
            title,
            url: '',
            audioUrl: '', // Don't store data URL in localStorage — too large
            localFile: true,
            fileName: file.name,
          });
          // Mark as already initialized so useEffect doesn't overwrite podcastAudio
          lastInitializedSourceRef.current = newSource.id;
          showToast('Audio file loaded');
          setPendingNotebookLMModal(true);
        };
        input.click();
      };

      const relinkAudioFile = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'audio/*,.m4a,.m4b,.aac';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const blobUrl = await processLocalAudioFile(file);
          activeBlobUrlsRef.current.add(blobUrl);
          updateSource(currentSource.id, { audioUrl: '' }); // Keep localStorage small
          setPodcastAudio(prev => ({ ...prev, audioUrl: blobUrl }));
          setNeedsFileRelink(false);
          showToast('Audio file re-linked');
          setTimeout(() => {
            if (audioPlayerRef.current) {
              const savedPositions = HJStore.get('media_positions') || {};
              const savedPosition = savedPositions[currentSource.id];
              if (savedPosition) {
                audioPlayerRef.current.currentTime = savedPosition;
                setCurrentTime(savedPosition);
              }
            }
          }, 500);
        };
        input.click();
      };

      const loadMedia = async () => {
        const urlType = detectUrlType(url);

        // Check for duplicates before any fetching/embed-init work.
        // For YouTube/X we extract the canonical id so different URL forms
        // (youtu.be vs youtube.com/watch) still match.
        const dupCandidate = { url };
        if (urlType === 'youtube') {
          const ytId = extractVideoId(url);
          if (ytId) dupCandidate.videoId = ytId;
        } else if (urlType === 'xvideo') {
          const xInfo = extractXVideoInfo(url);
          if (xInfo) dupCandidate.xVideoId = xInfo.id;
        }
        if (!await checkDuplicateBeforeLoad(dupCandidate)) {
          setUrl('');
          return;
        }

        if (urlType === 'youtube') {
          const id = extractVideoId(url);
          if (!id) {
            showToast('Invalid YouTube URL');
            return;
          }

          setVideoId(id);
          setPodcastAudio(null);
          setXVideo(null);

          // Fetch YouTube title and channel via oEmbed API
          let videoTitle = 'YouTube Video';
          let channelName = '';
          try {
            const oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
            const response = await fetch(oembedUrl);
            if (response.ok) {
              const data = await response.json();
              videoTitle = data.title || 'YouTube Video';
              channelName = data.author_name || '';
            }
          } catch (err) {
            console.log('Could not fetch YouTube metadata:', err);
          }

          addSource({
            type: 'youtube',
            title: videoTitle,
            url: url,
            videoId: id,
            channelName: channelName
          });

          setUrl(''); // Clear URL after successful load

          // Initialize player after state update
          setTimeout(() => {
            if (window.YT && window.YT.Player) {
              initPlayer(id);
            } else {
              window.onYouTubeIframeAPIReady = () => initPlayer(id);
            }
          }, 100);
        } else if (urlType === 'spotify') {
          loadPodcastFromSpotify();
        } else if (urlType === 'rss') {
          loadRSSFeed(url);
        } else if (urlType === 'audio') {
          // Direct audio URL
          setVideoId(null);
          setXVideo(null);
          setArtworkFailed(false);
          setPodcastAudio({
            audioUrl: url,
            title: 'Audio',
            showName: ''
          });
          addSource({
            type: 'podcast',
            title: 'Audio',
            url: url,
            audioUrl: url
          });
          setUrl(''); // Clear URL after successful load
          showToast('Audio loaded');
        } else if (urlType === 'xvideo') {
          const info = extractXVideoInfo(url);
          if (!info) {
            showToast('Invalid X.com URL — paste a tweet or broadcast link');
            return;
          }

          const embedUrl = info.type === 'broadcast'
            ? `https://broadcast.twitter.com/live/${info.id}/embed`
            : `https://platform.twitter.com/embed/Tweet.html?id=${info.id}&dnt=true`;

          // Fetch oEmbed metadata (works for tweets; may not work for broadcasts)
          let videoTitle = info.type === 'broadcast' ? 'X Broadcast' : 'X Video';
          let author = '';
          try {
            const oembedUrl = `https://publish.twitter.com/oembed?url=${encodeURIComponent(url)}&omit_script=true`;
            const response = await fetch(oembedUrl);
            if (response.ok) {
              const data = await response.json();
              author = data.author_name || '';
              // Extract tweet text from oEmbed HTML for a real title
              try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.html, 'text/html');
                const pEl = doc.querySelector('blockquote p');
                const tweetText = pEl ? pEl.textContent.replace(/https?:\/\/\S+/g, '').replace(/\s+/g, ' ').trim() : '';
                videoTitle = tweetText || (author ? `@${author}` : videoTitle);
              } catch (e) {
                videoTitle = author ? `@${author}` : videoTitle;
              }
            }
          } catch (err) {
            console.log('Could not fetch X.com oEmbed metadata:', err);
          }

          // Fetch direct MP4 URL via syndication endpoint so we can render a
          // native <video> element with full playback control. Broadcasts and
          // tweets without video fall back to the iframe embed.
          const mp4Url = info.type === 'tweet' ? await fetchXTweetVideoUrl(info.id) : null;

          setVideoId(null);
          setPodcastAudio(null);
          setIsPlaying(false);
          setCurrentTime(0);
          setDuration(0);
          setXVideo({ id: info.id, embedUrl, type: info.type, mp4Url });

          addSource({
            type: 'xvideo',
            title: videoTitle,
            url: url,
            xVideoId: info.id,
            xVideoType: info.type,
            embedUrl: embedUrl,
            channelName: author
          });

          setUrl('');
          showToast(mp4Url ? 'X video loaded' : 'X video loaded — tap Play to start timer for timestamped notes');
        } else {
          // Unknown URL type - try loading as RSS feed before giving up
          try {
            const corsProxies = [
              (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
              (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
              (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
            ];
            let text = null;
            for (const proxy of corsProxies) {
              try {
                const response = await fetch(proxy(url));
                if (response.ok) { text = await response.text(); break; }
              } catch (e) { continue; }
            }
            if (text) {
              // Check if response looks like XML/RSS content
              if (text.trim().startsWith('<?xml') || text.trim().startsWith('<rss') || text.includes('<channel>') || text.includes('<feed')) {
                loadRSSFeed(url);
                return;
              }
            }
          } catch (e) {
            // Fetch failed, fall through to error
          }
          showToast('Please enter a YouTube, Spotify, or RSS feed URL');
        }
      };

      // Text note functions
      const openTextNote = () => {
        // Store playback state and pause if playing
        if (isPlaying) {
          wasPlayingRef.current = true;
          if (audioPlayerRef.current) audioPlayerRef.current.pause();
          if (playerRef.current) playerRef.current.pauseVideo();
          setIsPlaying(false);
        } else {
          wasPlayingRef.current = false;
        }
        setShowTextNote(true);
      };

      const saveTextNote = () => {
        if (textNote.trim() && currentSource) {
          addNote({
            sourceId: currentSource.id,
            timestamp: currentTime,
            text: textNote.trim(),
            type: 'text'
          });
          showToast('Note saved');
        }
        setTextNote('');
        setShowTextNote(false);
        // Resume playback if it was playing
        if (wasPlayingRef.current) {
          if (audioPlayerRef.current) audioPlayerRef.current.play();
          if (playerRef.current) playerRef.current.playVideo();
        }
      };

      const cancelTextNote = () => {
        setTextNote('');
        setShowTextNote(false);
        // Resume playback if it was playing
        if (wasPlayingRef.current) {
          if (audioPlayerRef.current) audioPlayerRef.current.play();
          if (playerRef.current) playerRef.current.playVideo();
        }
      };

      // Wake Lock helpers to keep screen on during playback
      const requestWakeLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            // Release old wake lock if it exists
            if (wakeLockRef.current) {
              try {
                await wakeLockRef.current.release();
              } catch (e) {
                // Ignore errors from releasing
              }
            }

            // Always request fresh wake lock (handles screen on/off cycles)
            wakeLockRef.current = await navigator.wakeLock.request('screen');
            console.log('Wake Lock activated');

            // Listen for release event to clear the ref
            wakeLockRef.current.addEventListener('release', () => {
              console.log('Wake Lock was released');
              wakeLockRef.current = null;
            });
          }
        } catch (err) {
          console.log('Wake Lock not supported or failed:', err);
          wakeLockRef.current = null;
        }
      };

      const releaseWakeLock = async () => {
        try {
          if (wakeLockRef.current) {
            await wakeLockRef.current.release();
            wakeLockRef.current = null;
            console.log('Wake Lock released');
          }
        } catch (err) {
          console.log('Wake Lock release failed:', err);
        }
      };

      const initPlayer = (id, sourceId) => {
        if (playerRef.current && playerRef.current.destroy) {
          playerRef.current.destroy();
        }

        // Look up saved position to pass as start parameter
        let startSeconds = 0;
        if (sourceId) {
          const savedPositions = HJStore.get('media_positions') || {};
          startSeconds = savedPositions[sourceId] || 0;
        }

        playerRef.current = new window.YT.Player('youtube-player', {
          videoId: id,
          playerVars: {
            autoplay: 0,
            controls: 1,
            modestbranding: 1,
            rel: 0,
            start: Math.floor(startSeconds)
          },
          events: {
            onReady: (event) => {
              const dur = event.target.getDuration();
              setDuration(dur);
              // Update source with duration for Library display
              if (currentSource?.id && dur && isFinite(dur)) {
                updateSource(currentSource.id, { duration: dur });
              }
              // Set UI time to match start position
              if (startSeconds > 0) {
                setCurrentTime(startSeconds);
              }
            },
            onStateChange: (event) => {
              setIsPlaying(event.data === window.YT.PlayerState.PLAYING);

              if (event.data === window.YT.PlayerState.PLAYING) {
                requestWakeLock(); // Keep screen on while playing
                intervalRef.current = setInterval(() => {
                  setCurrentTime(playerRef.current.getCurrentTime());
                }, 500);
              } else {
                releaseWakeLock(); // Release when paused/stopped
                clearInterval(intervalRef.current);
              }

              // Auto-mark as read when video ends
              if (event.data === window.YT.PlayerState.ENDED) {
                if (currentSource?.id && !currentSource.isRead) {
                  updateSource(currentSource.id, { isRead: true });
                }
              }
            }
          }
        });
      };

      const togglePlayback = () => {
        if (xVideo) {
          if (videoPlayerRef.current) {
            if (videoPlayerRef.current.paused) videoPlayerRef.current.play();
            else videoPlayerRef.current.pause();
            return;
          }
          const newPlaying = !isPlaying;
          setIsPlaying(newPlaying);
          if (newPlaying) requestWakeLock();
          else releaseWakeLock();
          return;
        }
        if (!playerRef.current) return;

        if (isPlaying) {
          playerRef.current.pauseVideo();
        } else {
          playerRef.current.playVideo();
        }
      };

      const skipTime = (seconds) => {
        if (xVideo) {
          if (videoPlayerRef.current) {
            const dur = videoPlayerRef.current.duration || duration || 0;
            const newTime = Math.max(0, Math.min(dur || Infinity, videoPlayerRef.current.currentTime + seconds));
            videoPlayerRef.current.currentTime = newTime;
            return;
          }
          setCurrentTime(prev => Math.max(0, prev + seconds));
          return;
        }
        if (!playerRef.current) return;
        const wasPlaying = isPlaying;
        const newTime = Math.max(0, Math.min(duration, currentTime + seconds));
        playerRef.current.seekTo(newTime, true);
        setCurrentTime(newTime);
        // Resume playback if it was playing before seek
        if (wasPlaying) {
          setTimeout(() => playerRef.current?.playVideo(), 100);
        }
      };

      const stopRecording = () => {
        intentionalStopRef.current = true;
        if (webSpeechSilenceTimerRef.current) {
          clearTimeout(webSpeechSilenceTimerRef.current);
          webSpeechSilenceTimerRef.current = null;
        }
        if (mediaRecorderRef.current) {
          try {
            playSound('stop');
            mediaRecorderRef.current.stop();
          } catch (err) {
            console.log('Error stopping recognition:', err);
          }
          mediaRecorderRef.current = null;
        }
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
      };

      const handleVoiceButtonClick = () => {
        if (isRecording) {
          stopRecording();
        } else if (isTranscribing || whisperLoading) {
          playSound('error');
          showToast(whisperLoading ? 'Loading speech model...' : 'Still processing...');
        } else if (isStartingRecordingRef.current) {
          playSound('error');
          showToast('Please wait, starting recording...');
        } else {
          startRecording();
        }
      };

      // Load Whisper model for fallback
      const loadWhisperModel = async () => {
        if (window.WhisperASR?.isReady) {
          setUseWhisperFallback(true);
          return true;
        }
        if (whisperLoading) return false;

        setWhisperLoading(true);
        showToast('Loading offline speech model (40MB)...');

        const success = await window.WhisperASR?.loadModel((progress) => {
          setWhisperProgress(progress);
        });

        setWhisperLoading(false);
        if (success) {
          setUseWhisperFallback(true);
          showToast('Offline speech model ready!');
          return true;
        } else {
          showToast('Failed to load offline model');
          return false;
        }
      };

      // Start recording using Whisper (MediaRecorder-based) with silence detection
      const startWhisperRecording = async (wasPlaying, recordingTime) => {
        try {
          const audioConstraints = {
            audio: {
              echoCancellation: { ideal: true },
              noiseSuppression: { ideal: true },
              autoGainControl: { ideal: true },
              channelCount: { ideal: 1 },
              sampleRate: { ideal: 16000 }
            }
          };
          const stream = await navigator.mediaDevices.getUserMedia(audioConstraints);
          streamRef.current = stream;

          // Set up silence detection using Web Audio API
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          audioContextRef.current = audioContext;
          const analyser = audioContext.createAnalyser();
          analyzerRef.current = analyser;
          analyser.fftSize = 512;
          analyser.smoothingTimeConstant = 0.1;

          const source = audioContext.createMediaStreamSource(stream);
          source.connect(analyser);

          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          let silenceStart = null;
          let hasDetectedSpeech = false;
          const SILENCE_THRESHOLD = 15; // Audio level below this is considered silence
          const SILENCE_DURATION = 2500; // Stop after 2.5 seconds of silence
          const MAX_RECORDING_TIME = 60000; // Maximum 60 seconds
          const recordingStartTime = Date.now();

          const mimeType = window.WhisperASR?.getSupportedMimeType() || '';
          const mediaRecorder = mimeType
            ? new MediaRecorder(stream, { mimeType })
            : new MediaRecorder(stream);
          mediaRecorderRef.current = mediaRecorder;

          const audioChunks = [];

          // Silence detection loop
          const checkSilence = () => {
            if (!mediaRecorderRef.current || mediaRecorderRef.current.state !== 'recording') {
              return;
            }

            analyser.getByteFrequencyData(dataArray);
            const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

            // Check for max recording time
            if (Date.now() - recordingStartTime > MAX_RECORDING_TIME) {
              console.log('Max recording time reached, stopping');
              mediaRecorderRef.current.stop();
              return;
            }

            if (average > SILENCE_THRESHOLD) {
              // Sound detected
              hasDetectedSpeech = true;
              silenceStart = null;
            } else if (hasDetectedSpeech) {
              // Silence after speech
              if (!silenceStart) {
                silenceStart = Date.now();
              } else if (Date.now() - silenceStart > SILENCE_DURATION) {
                console.log('Silence detected, stopping recording');
                mediaRecorderRef.current.stop();
                return;
              }
            }

            silenceTimeoutRef.current = requestAnimationFrame(checkSilence);
          };

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onerror = (event) => {
            console.error('MediaRecorder error:', event.error);
            if (silenceTimeoutRef.current) {
              cancelAnimationFrame(silenceTimeoutRef.current);
            }
            if (audioContextRef.current) {
              audioContextRef.current.close().catch(() => {});
            }
            showToast('Recording error. Try again.');
            stream.getTracks().forEach(track => track.stop());
            setIsRecording(false);
            isStartingRecordingRef.current = false;
          };

          mediaRecorder.onstop = async () => {
            // Clean up silence detection
            if (silenceTimeoutRef.current) {
              cancelAnimationFrame(silenceTimeoutRef.current);
            }
            if (audioContextRef.current) {
              audioContextRef.current.close().catch(() => {});
              audioContextRef.current = null;
            }

            stream.getTracks().forEach(track => track.stop());
            streamRef.current = null;

            if (audioChunks.length === 0) {
              playSound('error');
              showToast('No audio captured. Try again.');
              setIsRecording(false);
              return;
            }

            const audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });

            if (audioBlob.size < 500) {
              playSound('error');
              showToast('Recording too short. Try again.');
              setIsRecording(false);
              return;
            }

            setIsRecording(false);
            setIsTranscribing(true);

            try {
              const transcript = await window.WhisperASR.transcribe(audioBlob);
              if (transcript && transcript.trim()) {
                addNote({
                  sourceId: currentSource?.id,
                  text: transcript.trim(),
                  timestamp: recordingTime,
                  type: 'voice'
                });
                playSound('success');
                showToast('Note saved!');
              } else {
                playSound('error');
                showToast('No speech detected - try speaking louder');
              }
            } catch (error) {
              console.error('Transcription failed:', error);
              playSound('error');
              showToast('Transcription failed. Try again.');
            }
            setIsTranscribing(false);

            // Resume playback if it was playing before recording (use passed parameter, not ref)
            if (wasPlaying) {
              if (audioPlayerRef.current) {
                audioPlayerRef.current.play();
                requestWakeLock();
              }
              if (playerRef.current) {
                playerRef.current.playVideo();
              }
            }
          };

          mediaRecorder.start(100);
          setIsRecording(true);
          isStartingRecordingRef.current = false;
          playSound('start');
          showToast('Listening (offline mode)...');

          // Start silence detection
          checkSilence();
        } catch (error) {
          console.error('Failed to start Whisper recording:', error);
          playSound('error');
          showToast('Failed to access microphone');
          setIsRecording(false);
          isStartingRecordingRef.current = false;
        }
      };

      const startRecording = async () => {
        console.log('=== startRecording called (MediaView) ===');
        console.log('speechReady:', speechReady, 'useWhisperFallback:', useWhisperFallback);

        if (!speechReady) {
          playSound('error');
          showToast('Speech recognition not available. Use text notes.');
          return;
        }

        if (isStartingRecordingRef.current) {
          return;
        }
        isStartingRecordingRef.current = true;

        stopRecording();

        // Capture playing state in local variable BEFORE pausing (closures will preserve this)
        const wasPlaying = isPlaying;
        const recordingTime = currentTime;

        if (isPlaying && playerRef.current) {
          playerRef.current.pauseVideo();
        }
        if (isPlaying && audioPlayerRef.current) {
          audioPlayerRef.current.pause();
        }

        // Use Whisper if fallback is enabled or Web Speech has had network errors
        if (useWhisperFallback || window.WebSpeechAPI?.hasNetworkError) {
          if (!window.WhisperASR?.isReady) {
            const loaded = await loadWhisperModel();
            if (!loaded) {
              isStartingRecordingRef.current = false;
              return;
            }
          }
          await startWhisperRecording(wasPlaying, recordingTime);
          return;
        }

        // Try Web Speech API (primary)
        try {
          const recognition = window.WebSpeechAPI.createRecognition({
            continuous: true,
            interimResults: true,
            lang: 'en-US'
          });

          let finalTranscript = '';
          let hasResult = false;
          let hadError = false;
          intentionalStopRef.current = false;
          const recordingStartedAt = Date.now();
          const MAX_RECORDING_MS = 60000;

          // Extend pause tolerance: Chrome can fire onend after a final result even
          // with continuous: true, so we (a) only clear the timer on speechstart, not
          // on every result, and (b) auto-restart in onend unless the stop was
          // intentional (user click or our own 2.5s silence timer firing).
          const SPEECH_END_TIMEOUT = 2500;
          const armSilenceTimer = () => {
            if (webSpeechSilenceTimerRef.current) {
              clearTimeout(webSpeechSilenceTimerRef.current);
            }
            webSpeechSilenceTimerRef.current = setTimeout(() => {
              webSpeechSilenceTimerRef.current = null;
              intentionalStopRef.current = true;
              try { recognition.stop(); } catch (err) { /* already stopped */ }
            }, SPEECH_END_TIMEOUT);
          };
          const clearSilenceTimer = () => {
            if (webSpeechSilenceTimerRef.current) {
              clearTimeout(webSpeechSilenceTimerRef.current);
              webSpeechSilenceTimerRef.current = null;
            }
          };

          recognition.onstart = () => {
            console.log('Web Speech recognition started (MediaView)');
            setIsRecording(true);
            isStartingRecordingRef.current = false;
            playSound('start');
            showToast('Listening...');
          };

          recognition.onspeechstart = () => {
            clearSilenceTimer();
          };

          recognition.onspeechend = () => {
            armSilenceTimer();
          };

          recognition.onresult = (event) => {
            hasResult = true;
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
              const transcript = event.results[i][0].transcript;
              if (event.results[i].isFinal) {
                finalTranscript += transcript;
              } else {
                interimTranscript += transcript;
              }
            }
            console.log('Interim:', interimTranscript, 'Final:', finalTranscript);
          };

          recognition.onend = () => {
            const exceededMax = Date.now() - recordingStartedAt > MAX_RECORDING_MS;
            if (!intentionalStopRef.current && !hadError && !exceededMax) {
              try {
                recognition.start();
                return;
              } catch (err) {
                console.warn('Could not restart recognition; finalizing.', err);
              }
            }

            clearSilenceTimer();
            console.log('Web Speech recognition ended (MediaView)');
            setIsRecording(false);
            isStartingRecordingRef.current = false;

            if (hadError) {
              console.log('Skipping onend message - error already handled');
            } else if (finalTranscript.trim()) {
              addNote({
                sourceId: currentSource?.id,
                text: finalTranscript.trim(),
                timestamp: recordingTime,
                type: 'voice'
              });
              playSound('success');
              showToast('Note saved!');
            } else if (hasResult) {
              playSound('error');
              showToast('No speech detected - try again');
            } else {
              playSound('error');
              showToast('No speech detected - try speaking louder');
            }

            // Resume playback if it was playing before recording (use local variable from closure)
            if (wasPlaying) {
              if (audioPlayerRef.current) {
                audioPlayerRef.current.play();
                requestWakeLock();
              }
              if (playerRef.current) {
                playerRef.current.playVideo();
              }
            }
          };

          recognition.onerror = (event) => {
            clearSilenceTimer();
            console.error('Speech recognition error:', event.error);
            hadError = true;
            setIsRecording(false);
            isStartingRecordingRef.current = false;

            if (event.error === 'network') {
              window.WebSpeechAPI.markNetworkError();
              playSound('error');
              showToast('Network error - switching to offline mode...');
              loadWhisperModel().then(success => {
                if (success) {
                  showToast('Offline mode ready! Try recording again.');
                }
              });
            } else if (event.error === 'not-allowed' || event.error === 'permission-denied') {
              playSound('error');
              showToast('Microphone access denied');
            } else if (event.error === 'no-speech') {
              playSound('error');
              showToast('No speech detected - try again');
            } else if (event.error === 'aborted') {
              playSound('error');
              showToast('Speech recognition interrupted. Try again.');
            } else if (event.error === 'audio-capture') {
              playSound('error');
