    };

    // Reader View Component
    const ReaderView = React.forwardRef(({ currentSource, setCurrentSource, addSource, updateSource, addNote, notes, sources, setActiveTab, showToast, carMode, setCarMode, isMobileDevice, checkDuplicateBeforeLoad }, ref) => {
      const [url, setUrl] = useState('');
      const [loading, setLoading] = useState(false);
      const [content, setContent] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentSentenceIndex, setCurrentSentenceIndex] = useState(0);
      const [isRecording, setIsRecording] = useState(false);
      const [speed, setSpeed] = useState(1);
      const [manualContent, setManualContent] = useState('');
      const [showManualInput, setShowManualInput] = useState(false);
      const [showTextNote, setShowTextNote] = useState(false);
      const [textNote, setTextNote] = useState('');
      const [speechReady, setSpeechReady] = useState(false);
      const [useWhisperFallback, setUseWhisperFallback] = useState(false);
      const [whisperLoading, setWhisperLoading] = useState(false);
      const [whisperProgress, setWhisperProgress] = useState(0);
      const [isTranscribing, setIsTranscribing] = useState(false);
      const [autoScroll, setAutoScroll] = useState(true);
      const [showSearch, setShowSearch] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);

      const utteranceRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const streamRef = useRef(null);
      const sentencesRef = useRef([]);
      const wasPlayingRef = useRef(false);
      const interruptedSentenceRef = useRef(0);
      const speakFromIndexRef = useRef(null);
      const lastBackPressRef = useRef(0);
      const wasCancelledRef = useRef(false);
      const wakeLockRef = useRef(null);
      const sentenceRefs = useRef({});
      const readerContainerRef = useRef(null);
      const isManualScrollingRef = useRef(false);
      const isStartingRecordingRef = useRef(false);
      const manualInputRef = useRef(null);

      // Expose navigation method to parent
      useImperativeHandle(ref, () => ({
        navigateToSentence: (index) => {
          setCurrentSentenceIndex(index);
          setAutoScroll(true);
          // Scroll to the sentence after a brief delay to ensure render
          setTimeout(() => {
            const sentenceElement = sentenceRefs.current[index];
            if (sentenceElement) {
              sentenceElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }, 100);
        }
      }));

      // Scroll manual paste textarea into view and focus it when it appears
      useEffect(() => {
        if (showManualInput && manualInputRef.current) {
          manualInputRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          manualInputRef.current.focus();
        }
      }, [showManualInput]);

      // Auto-scroll to current sentence when playing
      useEffect(() => {
        if (autoScroll && content) {
          const sentenceElement = sentenceRefs.current[currentSentenceIndex];
          if (sentenceElement) {
            isManualScrollingRef.current = false;
            sentenceElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentSentenceIndex, autoScroll, content]);

      // Detect manual scrolling to disable auto-scroll
      useEffect(() => {
        const container = readerContainerRef.current;
        if (!container) return;

        let scrollTimeout;
        const handleScroll = () => {
          // Only disable auto-scroll if this is a user-initiated scroll
          if (!isManualScrollingRef.current && autoScroll) {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
              setAutoScroll(false);
            }, 150);
          }
          isManualScrollingRef.current = false;
        };

        container.addEventListener('scroll', handleScroll, { passive: true });
        return () => {
          container.removeEventListener('scroll', handleScroll);
          clearTimeout(scrollTimeout);
        };
      }, [autoScroll]);

      // Skip to next sentence (stops current and plays next)
      const skipForward = () => {
        if (currentSentenceIndex < sentencesRef.current.length - 1) {
          setAutoScroll(true);
          wasCancelledRef.current = true;
          window.speechSynthesis.cancel();
          const nextIndex = currentSentenceIndex + 1;
          setCurrentSentenceIndex(nextIndex);
          if (isPlaying && speakFromIndexRef.current) {
            setTimeout(() => speakFromIndexRef.current(nextIndex), 50);
          }
        }
      };

      // Skip back - restart current sentence, or go to previous if pressed quickly
      const skipBack = () => {
        setAutoScroll(true);
        const now = Date.now();
        const timeSinceLastPress = now - lastBackPressRef.current;
        lastBackPressRef.current = now;

        wasCancelledRef.current = true;
        window.speechSynthesis.cancel();

        // If pressed within 1.5 seconds, go to previous sentence
        if (timeSinceLastPress < 1500 && currentSentenceIndex > 0) {
          const prevIndex = currentSentenceIndex - 1;
          setCurrentSentenceIndex(prevIndex);
          if (isPlaying && speakFromIndexRef.current) {
            setTimeout(() => speakFromIndexRef.current(prevIndex), 50);
          }
        } else {
          // Restart current sentence
          if (isPlaying && speakFromIndexRef.current) {
            setTimeout(() => speakFromIndexRef.current(currentSentenceIndex), 50);
          }
        }
      };

      // Search functionality
      const handleSearch = (query) => {
        setSearchQuery(query);
        if (!query.trim() || !content) {
          setSearchResults([]);
          return;
        }

        const results = [];
        const lowerQuery = query.toLowerCase();
        sentencesRef.current.forEach((sentence, index) => {
          if (sentence.toLowerCase().includes(lowerQuery)) {
            results.push({ index, sentence });
          }
        });
        setSearchResults(results);
      };

      const navigateToSearchResult = (index) => {
        setCurrentSentenceIndex(index);
        setAutoScroll(true);
        setShowSearch(false);
        setTimeout(() => {
          const sentenceElement = sentenceRefs.current[index];
          if (sentenceElement) {
            sentenceElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 100);
      };

      // Check Web Speech API availability on mount
      useEffect(() => {
        if (window.WebSpeechAPI?.isSupported) {
          setSpeechReady(true);
          console.log('ReaderView: Web Speech API ready');
          // Check if we previously had network errors and Whisper is loaded
          if (window.WebSpeechAPI.hasNetworkError && window.WhisperASR?.isReady) {
            setUseWhisperFallback(true);
            console.log('ReaderView: Using Whisper fallback due to previous network errors');
          }
        } else if (window.WhisperASR) {
          // Web Speech not supported, Whisper available as fallback
          console.log('ReaderView: Web Speech API not supported, Whisper fallback available');
          setSpeechReady(true); // Enable button, will use Whisper
          setUseWhisperFallback(true);
        } else {
          console.log('ReaderView: No speech recognition available');
          showToast('Speech recognition not supported in this browser. Use text notes.');
        }
      }, []);

      // Load source content and saved position when currentSource changes
      useEffect(() => {
        if (currentSource && (currentSource.type === 'article' || currentSource.type === 'pdf') && currentSource.content) {
          setContent({
            title: currentSource.title,
            sentences: currentSource.sentences || splitIntoSentences(currentSource.content),
            url: currentSource.url
          });
          sentencesRef.current = currentSource.sentences || splitIntoSentences(currentSource.content);

          // Load saved position for this source
          const savedPositions = HJStore.get('positions') || {};
          const savedPosition = savedPositions[currentSource.id];
          if (savedPosition !== undefined && savedPosition < sentencesRef.current.length) {
            setCurrentSentenceIndex(savedPosition);
          } else {
            setCurrentSentenceIndex(0);
          }

          // Load saved speed for this source
          setSpeed(currentSource.speed || 1);
        }
      }, [currentSource]);

      // Save position whenever it changes
      useEffect(() => {
        if (currentSource?.id && content) {
          const savedPositions = HJStore.get('positions') || {};
          savedPositions[currentSource.id] = currentSentenceIndex;
          HJStore.set('positions', savedPositions).catch((e) => console.error('Failed to save position:', e));
        }
      }, [currentSentenceIndex, currentSource?.id, content]);

      // Track isPlaying and currentSentenceIndex in refs for use in event handlers / media session callbacks
      const isPlayingRef = useRef(false);
      useEffect(() => {
        isPlayingRef.current = isPlaying;
      }, [isPlaying]);

      const currentSentenceIndexRef = useRef(0);
      useEffect(() => {
        currentSentenceIndexRef.current = currentSentenceIndex;
      }, [currentSentenceIndex]);

      // Cancel TTS cleanly when the page is actually closed (not just backgrounded).
      // TTS continues playing when the tab is hidden — same as podcast/YouTube behavior.
      useEffect(() => {
        const handleBeforeUnload = () => {
          if (isPlayingRef.current) {
            window.speechSynthesis.cancel();
          }
        };

        window.addEventListener('beforeunload', handleBeforeUnload);

        return () => {
          window.removeEventListener('beforeunload', handleBeforeUnload);
        };
      }, []);

      // Chrome pauses speechSynthesis in background tabs after ~30s (known browser bug).
      // Resume it periodically to keep TTS playing when the app is backgrounded.
      useEffect(() => {
        if (!isPlaying) return;
        const keepAlive = setInterval(() => {
          if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }
        }, 10000);
        return () => clearInterval(keepAlive);
      }, [isPlaying]);

      const splitIntoSentences = (text) => {
        return text.match(/[^.!?]+[.!?]+/g) || [text];
      };

      const extractArticleContent = (html) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Before removing scripts, extract structured data that may contain article content
        let structuredTitle = null;
        let structuredText = null;

        // Try JSON-LD (used by Forbes, NYT, WaPo, and many news sites)
        try {
          const jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
          for (const script of jsonLdScripts) {
            try {
              const data = JSON.parse(script.textContent);
              // JSON-LD can be a single object or an array
              const items = Array.isArray(data) ? data : [data];
              for (const item of items) {
                // Check @graph array (some sites nest articles in @graph)
                const candidates = item['@graph'] ? [...item['@graph'], item] : [item];
                for (const candidate of candidates) {
                  const itemType = candidate['@type'];
                  const isArticle = Array.isArray(itemType)
                    ? itemType.some(t => /article|story|report|review|posting/i.test(t))
                    : /article|story|report|review|posting/i.test(itemType || '');
                  if (isArticle && candidate.articleBody) {
                    structuredText = candidate.articleBody;
                    structuredTitle = candidate.headline || candidate.name || null;
                    break;
                  }
                }
                if (structuredText) break;
              }
            } catch (e) { /* skip malformed JSON-LD */ }
            if (structuredText) break;
          }
        } catch (e) { /* skip JSON-LD extraction errors */ }

        // Try __NEXT_DATA__ (Next.js sites like Forbes)
        if (!structuredText) {
          try {
            const nextDataScript = doc.querySelector('script#__NEXT_DATA__');
            if (nextDataScript) {
              const nextData = JSON.parse(nextDataScript.textContent);
              // Walk the props tree looking for article body content
              const findArticleBody = (obj, depth = 0) => {
                if (!obj || depth > 8 || typeof obj !== 'object') return null;
                // Look for common article body field names
                for (const key of ['articleBody', 'body', 'content', 'articleContent']) {
                  if (typeof obj[key] === 'string' && obj[key].length > 200) {
                    return { text: obj[key], title: obj.title || obj.headline || null };
                  }
                }
                // Recurse into sub-objects
                for (const val of Object.values(obj)) {
                  const result = findArticleBody(val, depth + 1);
                  if (result) return result;
                }
                return null;
              };
              const found = findArticleBody(nextData?.props?.pageProps);
              if (found) {
                structuredText = found.text;
                structuredTitle = found.title || null;
              }
            }
          } catch (e) { /* skip __NEXT_DATA__ extraction errors */ }
        }

        // Remove unwanted elements
        const removeSelectors = ['script', 'style', 'nav', 'header', 'footer', 'aside', 'iframe', 'noscript', '.ad', '.advertisement', '.sidebar', '.menu', '.navigation', '.comment', '.comments'];
        removeSelectors.forEach(selector => {
          doc.querySelectorAll(selector).forEach(el => el.remove());
        });

        // Get the title from multiple sources
        const title = doc.querySelector('meta[property="og:title"]')?.content ||
                      doc.querySelector('h1')?.textContent ||
                      doc.querySelector('title')?.textContent ||
                      structuredTitle ||
                      'Untitled Article';

        // Try to find main content in order of preference
        const contentSelectors = [
          'article',
          '[role="main"]',
          'main',
          '.available-content',     // Substack
          '.body.markup',           // Substack
          'div.markup',             // Substack
          '.post-content-wrapper',  // Substack
          '.article-content',
          '.post-content',
          '.entry-content',
          '.content',
          '.article-body',
          '.article-body-container',
          '.body-container',
          '.story-body',
          '.story-content',
          '#content',
          '#article',
          '#article-body'
        ];

        let contentElement = null;
        for (const selector of contentSelectors) {
          contentElement = doc.querySelector(selector);
          if (contentElement) break;
        }

        // Fall back to body if no specific content area found
        if (!contentElement) {
          contentElement = doc.body;
        }

        // Helper: clean and collapse whitespace in extracted text
        const cleanText = (t) => t.replace(/\s+/g, ' ').replace(/\n+/g, ' ').replace(/\t+/g, ' ').trim();

        // Helper: extract paragraph text from an element
        const extractParagraphs = (el) => {
          const paras = el.querySelectorAll('p');
          let result = '';
          paras.forEach(p => {
            const pText = p.textContent.trim();
            if (pText.length > 10) result += pText + ' ';
          });
          return result;
        };

        // Strategy A: paragraph extraction from content element
        let text = cleanText(extractParagraphs(contentElement));

        // Strategy B: full textContent from content element
        if (text.length < 200 && contentElement !== doc.body) {
          console.log('Paragraph extraction insufficient, trying full content element text');
          text = cleanText(contentElement.textContent);
        }

        // Strategy C: text density analysis — find the block most likely to be article body
        if (text.length < 200) {
          console.log('Content element insufficient, trying text density analysis');
          const candidates = doc.querySelectorAll('div, section, article, main');
          let bestElement = null;
          let bestScore = 0;

          candidates.forEach(el => {
            const elText = el.textContent.trim();
            if (elText.length < 200) return;
            const htmlLen = el.innerHTML.length;
            const textDensity = elText.length / Math.max(htmlLen, 1);
            const pCount = el.querySelectorAll('p').length;
            const pBonus = Math.min(pCount / 5, 2);
            const score = textDensity * elText.length * (1 + pBonus);
            if (score > bestScore) {
              bestScore = score;
              bestElement = el;
            }
          });

          if (bestElement) {
            // Try paragraphs first, then textContent
            let densityText = cleanText(extractParagraphs(bestElement));
            if (densityText.length < 200) densityText = cleanText(bestElement.textContent);
            if (densityText.length > text.length) {
              text = densityText;
              console.log('Text density analysis found better content:', text.length, 'chars');
            }
          }
        }

        // Strategy D: last resort — full body text
        if (text.length < 200) {
          console.log('All DOM strategies insufficient, falling back to body text');
          const bodyText = cleanText(doc.body.textContent);
          if (bodyText.length > text.length) text = bodyText;
        }

        // Strategy E: structured data override (JSON-LD / __NEXT_DATA__)
        let usedStructuredData = false;
        if (text.length < 200 && structuredText) {
          console.log('DOM extraction insufficient, using structured data (JSON-LD / __NEXT_DATA__)');
          text = cleanText(structuredText);
          usedStructuredData = true;
        }

        // Prefer structured title when we fell back to structured data
        const finalTitle = (usedStructuredData && structuredTitle)
          ? structuredTitle.trim()
          : title.trim();

        return { title: finalTitle, text };
      };

      const processPdfContent = async (pdfData, pdfUrl, filenameHint = '') => {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        console.log('PDF data loaded:', pdfData.byteLength, 'bytes');

        const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
        console.log('PDF parsed:', pdf.numPages, 'pages');

        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          if (pdf.numPages > 5) {
            showToast(`Loading page ${i} of ${pdf.numPages}...`);
          }
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();

          // Smart text reconstruction using item positioning
          let pageText = '';
          let prevY = null;
          let prevItemEnd = null;

          for (const item of textContent.items) {
            if (!item.str) continue;

            const y = item.transform ? item.transform[5] : null;
            const x = item.transform ? item.transform[4] : null;
            const fontSize = item.transform
              ? (Math.abs(item.transform[0]) || Math.abs(item.transform[3]) || 12)
              : 12;

            if (prevY !== null && y !== null) {
              const yDiff = Math.abs(y - prevY);

              if (yDiff > fontSize * 1.8) {
                // Large vertical gap — paragraph break
                pageText += '\n\n';
              } else if (yDiff > fontSize * 0.3) {
                // New line — handle hyphenation
                if (pageText.endsWith('-')) {
                  pageText = pageText.slice(0, -1);
                } else {
                  pageText += ' ';
                }
              } else if (!pageText.endsWith(' ') && !item.str.startsWith(' ')) {
                // Same line — add space between items if there's a horizontal gap
                if (prevItemEnd !== null && x !== null && (x - prevItemEnd) > fontSize * 0.15) {
                  pageText += ' ';
                }
              }
            }

            pageText += item.str;

            if (item.transform) {
              prevY = y;
              prevItemEnd = x + (item.width || 0);
            }
          }

          fullText += pageText.trim() + '\n\n';
        }

        // Clean up for sentence splitting — collapse to single-line text
        fullText = fullText
          .replace(/\n{2,}/g, '. ')
          .replace(/\n/g, ' ')
          .replace(/\.\s*\./g, '.')
          .replace(/ {2,}/g, ' ')
          .trim();

        if (!fullText.trim()) {
          showToast('PDF has no readable text. It may be scanned/image-based.');
          setShowManualInput(true);
          setLoading(false);
          return;
        }

        // Try to get title from PDF metadata
        let pdfTitle = 'PDF Document';
        try {
          const metadata = await pdf.getMetadata();
          if (metadata?.info?.Title && metadata.info.Title.trim().length > 3) {
            pdfTitle = metadata.info.Title.trim();
          } else if (pdfUrl) {
            const urlSegment = pdfUrl.split('/').pop()?.replace(/\.pdf$/i, '').replace(/[_-]/g, ' ');
            pdfTitle = urlSegment || 'PDF Document';
          } else if (filenameHint) {
            pdfTitle = filenameHint.replace(/\.pdf$/i, '').replace(/[_-]/g, ' ');
          }
        } catch (e) {
          if (pdfUrl) {
            const urlSegment = pdfUrl.split('/').pop()?.replace(/\.pdf$/i, '').replace(/[_-]/g, ' ');
            pdfTitle = urlSegment || 'PDF Document';
          } else if (filenameHint) {
            pdfTitle = filenameHint.replace(/\.pdf$/i, '').replace(/[_-]/g, ' ');
          }
        }

        const sentences = splitIntoSentences(fullText);
        sentencesRef.current = sentences;

        addSource({
          type: 'pdf',
          title: pdfTitle,
          url: pdfUrl,
          content: fullText
        });

        setUrl('');
        showToast('PDF loaded successfully!');
        setLoading(false);
      };

      const loadLocalDocFile = async () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf,.docx,.doc';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          setLoading(true);
          try {
            const data = await file.arrayBuffer();
            if (file.name.toLowerCase().endsWith('.pdf')) {
              await processPdfContent(data, '', file.name);
            } else {
              // DOCX — lazy-load mammoth.js
              if (!window.mammoth) {
                await new Promise((resolve, reject) => {
                  const s = document.createElement('script');
                  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
                  s.onload = resolve;
                  s.onerror = reject;
                  document.head.appendChild(s);
                });
              }
              const result = await window.mammoth.extractRawText({ arrayBuffer: data });
              const fullText = result.value.trim();
              if (!fullText) {
                showToast('Could not extract text from this document.');
                setLoading(false);
                return;
              }
              const title = file.name.replace(/\.docx?$/i, '').replace(/[_-]/g, ' ');
              const sentences = splitIntoSentences(fullText);
              sentencesRef.current = sentences;
              addSource({ type: 'article', title, url: '', content: fullText, sentences });
              setUrl('');
              showToast('Document loaded!');
            }
          } catch (err) {
            showToast('Failed to load file.');
          } finally {
            setLoading(false);
          }
        };
        input.click();
      };

      const fetchContent = async () => {
        if (!url.trim()) return;

        // Bail out before any network work if this URL is already saved.
        if (!await checkDuplicateBeforeLoad({ url })) {
          setUrl('');
          return;
        }

        setLoading(true);

        // Helper: fetch URL as PDF binary data (direct + CORS proxy fallback)
        const fetchPdfBinary = async (pdfUrl) => {
          const proxies = [
            (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
            (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
            (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
          ];

          let pdfData;

          // Try direct fetch first
          try {
            console.log('Trying direct PDF fetch...');
            const response = await fetch(pdfUrl, { mode: 'cors' });
            if (response.ok) {
              pdfData = await response.arrayBuffer();
              console.log('Direct fetch succeeded');
            }
          } catch (e) {
            console.log('Direct fetch failed:', e.message);
          }

          // Try proxies if direct failed
          if (!pdfData) {
            for (const proxyFn of proxies) {
              try {
                const proxyUrl = proxyFn(pdfUrl);
                console.log('Trying proxy:', proxyUrl);
                const response = await fetch(proxyUrl);
                if (response.ok) {
                  pdfData = await response.arrayBuffer();
                  console.log('Proxy fetch succeeded:', pdfData.byteLength, 'bytes');
                  break;
                }
              } catch (e) {
                console.log('Proxy failed:', e.message);
              }
            }
          }

          return pdfData;
        };

        try {
          // Check if it's a PDF
          if (isPdfUrl(url)) {
            try {
              showToast('Loading PDF...');
              const pdfData = await fetchPdfBinary(url);
              if (!pdfData) {
                throw new Error('All fetch methods failed');
              }
              await processPdfContent(pdfData, url);
              return;
            } catch (error) {
              console.error('PDF fetch error:', error);
              showToast('Could not load PDF. Try pasting content manually.');
              setShowManualInput(true);
              setLoading(false);
              return;
            }
          }

          // Helper: fetch HTML via CORS proxies
          const fetchHtmlViaProxies = async (targetUrl) => {
            const corsProxies = [
              {
                name: 'allorigins',
                url: (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
                extract: (data) => data.contents
              },
              {
                name: 'corsproxy.io',
                url: (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                extract: (data) => data
              },
              {
                name: 'codetabs',
                url: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
                extract: (data) => data
              }
            ];

            // Returns true when a string appears to be binary/compressed data rather than
            // readable text. TextDecoder replaces invalid UTF-8 byte sequences with U+FFFD;
            // a high density of replacement chars or C0 control chars indicates raw bytes.
            const looksLikeBinary = (text) => {
              if (!text || text.length < 20) return false;
              const sample = text.slice(0, 500);
              let bad = 0;
              for (let i = 0; i < sample.length; i++) {
                const c = sample.charCodeAt(i);
                if (c < 32 && c !== 9 && c !== 10 && c !== 13) bad++;
                if (c === 0xFFFD) bad++;
              }
              return bad / sample.length > 0.03;
            };

            // Try to decompress an ArrayBuffer using DecompressionStream.
            // Returns the decoded string, or null if decompression fails/unsupported.
            const tryDecompress = async (buf, format) => {
              try {
                const ds = new DecompressionStream(format);
                const writer = ds.writable.getWriter();
                const reader = ds.readable.getReader();
                writer.write(buf);
                writer.close();
                const chunks = [];
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  chunks.push(value);
                }
                const total = chunks.reduce((acc, c) => acc + c.length, 0);
                const out = new Uint8Array(total);
                let off = 0;
                for (const c of chunks) { out.set(c, off); off += c.length; }
                return new TextDecoder().decode(out);
              } catch (_) {
                return null;
              }
            };

            // Decode a fetch Response body, handling cases where the proxy forwarded
            // compressed bytes without a matching Content-Encoding header so the browser
            // never decompressed them. Tries gzip, then brotli (Chrome 133+).
            const decodeBody = async (response) => {
              const buf = await response.arrayBuffer();
              const bytes = new Uint8Array(buf);
              // Gzip magic bytes
              if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
                const result = await tryDecompress(buf, 'gzip');
                if (result) return result;
              }
              const text = new TextDecoder().decode(buf);
              // If it looks like binary (e.g. brotli), try brotli decompression (Chrome 133+)
              if (looksLikeBinary(text)) {
                const result = await tryDecompress(buf, 'brotli');
                if (result && !looksLikeBinary(result)) return result;
              }
              return text;
            };

            for (const proxy of corsProxies) {
              try {
                console.log(`Trying ${proxy.name} proxy for ${targetUrl}...`);
                const proxyUrl = proxy.url(targetUrl);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`${proxy.name} returned ${response.status}`);
                let html;
                if (proxy.name === 'allorigins') {
                  const data = await response.json();
                  html = proxy.extract(data);
                  // allorigins may occasionally return raw compressed bytes in contents
                  if (html && looksLikeBinary(html)) {
                    const buf = new TextEncoder().encode(html).buffer;
                    const decompressed = await tryDecompress(buf, 'brotli') || await tryDecompress(buf, 'gzip');
                    if (decompressed && !looksLikeBinary(decompressed)) html = decompressed;
                  }
                } else {
                  const text = await decodeBody(response);
                  html = proxy.extract(text);
                }
                if (html && html.length > 100 && !looksLikeBinary(html)) {
                  console.log(`${proxy.name} succeeded`);
                  return html;
                }
                if (looksLikeBinary(html)) throw new Error(`${proxy.name} returned compressed/binary content`);
              } catch (error) {
                console.log(`${proxy.name} failed:`, error.message);
              }
            }
            return null;
          };

          // Helper: try to extract article content from HTML, returns null if insufficient
          const tryExtractArticle = (html) => {
            if (!html) return null;
            const result = extractArticleContent(html);
            return result.text.length >= 100 ? result : null;
          };

          // Strategy 0: ForumMagnum GraphQL API (LessWrong, Alignment Forum, EA Forum)
          // These sites block CORS proxy requests with 403, but expose a public GraphQL API
          // that returns clean post HTML via their /graphql endpoint.
          // Alignment Forum posts are mirrored from LessWrong with the same documentId,
          // and AF's own /graphql endpoint doesn't reliably return htmlBody — so route
          // alignmentforum.org URLs to lesswrong.com's GraphQL, falling back to the
          // post's own origin if that fails.
          if (isForumMagnumUrl(url)) {
            try {
              showToast('Fetching via LessWrong API...');
              const urlObj = new URL(url.startsWith('http') ? url : 'https://' + url);
              const pathParts = urlObj.pathname.split('/').filter(Boolean);
              // URL format: /posts/{documentId}/{slug}
              const postsIdx = pathParts.indexOf('posts');
              const documentId = postsIdx >= 0 ? pathParts[postsIdx + 1] : null;

              if (documentId) {
                const gqlQuery = `{post(input:{selector:{documentId:"${documentId}"}}){result{title,htmlBody}}}`;
                const host = urlObj.hostname.replace(/^www\./, '');
                const gqlOrigins = host === 'alignmentforum.org'
                  ? ['https://www.lesswrong.com', urlObj.origin]
                  : [urlObj.origin];

                // Try each origin through every available CORS proxy. The standard
                // fetcher uses three proxies; we mirror that here so the GraphQL path
                // doesn't silently fail when one proxy is rate-limited or down.
                const gqlProxies = [
                  { name: 'allorigins', wrap: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
                  { name: 'corsproxy.io', wrap: (u) => `https://corsproxy.io/?${encodeURIComponent(u)}` },
                  { name: 'codetabs', wrap: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}` },
                ];

                let loaded = false;
                outer: for (const origin of gqlOrigins) {
                  const gqlUrl = `${origin}/graphql?query=${encodeURIComponent(gqlQuery)}`;
                  for (const proxy of gqlProxies) {
                    try {
                      const response = await fetch(proxy.wrap(gqlUrl));
                      if (!response.ok) {
                        console.log(`GraphQL via ${proxy.name} (${origin}) returned ${response.status}`);
                        continue;
                      }
                      const text = await response.text();
                      let gqlData;
                      try { gqlData = JSON.parse(text); } catch {
                        console.log(`GraphQL via ${proxy.name} (${origin}) returned non-JSON`);
                        continue;
                      }
                      if (gqlData?.errors?.length) {
                        console.log(`GraphQL via ${proxy.name} (${origin}) errors:`, gqlData.errors);
                      }
                      const result = gqlData?.data?.post?.result;
                      if (result?.htmlBody && result.htmlBody.length > 100) {
                        const extracted = tryExtractArticle(result.htmlBody);
                        if (extracted) {
                          const title = result.title || extracted.title;
                          const { text: bodyText } = extracted;
                          const sentences = splitIntoSentences(bodyText);
                          sentencesRef.current = sentences;
                          addSource({ type: 'article', title, url, content: bodyText });
                          setUrl('');
                          showToast('Article loaded successfully!');
                          setLoading(false);
                          loaded = true;
                          break outer;
                        }
                      }
                    } catch (e) {
                      console.log(`GraphQL via ${proxy.name} (${origin}) failed:`, e.message);
                    }
                  }
                }
                if (loaded) return;
              }
              console.log('ForumMagnum GraphQL failed, falling back to standard strategies');
            } catch (e) {
              console.log('ForumMagnum GraphQL error:', e.message);
            }
          }

          // For web articles, try multiple fetch strategies
          showToast('Fetching article content...');

          let html = await fetchHtmlViaProxies(url);

          // Check if the response is actually a PDF (not detected by URL pattern)
          if (html && html.substring(0, 10).includes('%PDF-')) {
            try {
              showToast('PDF detected, loading...');
              const pdfData = await fetchPdfBinary(url);
              if (!pdfData) {
                throw new Error('All PDF fetch methods failed');
              }
              await processPdfContent(pdfData, url);
              return;
            } catch (error) {
              console.error('PDF fallback error:', error);
              showToast('Could not load PDF. Try pasting content manually.');
              setShowManualInput(true);
              setLoading(false);
              return;
            }
          }

          let extracted = tryExtractArticle(html);

          // Strategy 2: Try Wayback Machine (archive.org has CORS headers, no proxy needed)
          if (!extracted) {
            try {
              console.log('Trying Wayback Machine...');
              showToast('Trying archive.org...');
              const archiveUrl = `https://web.archive.org/web/2/${url}`;
              const archiveResponse = await fetch(archiveUrl);
              if (archiveResponse.ok) {
                const archiveHtml = await archiveResponse.text();
                extracted = tryExtractArticle(archiveHtml);
                if (extracted) console.log('Wayback Machine succeeded');
              }
            } catch (e) {
              console.log('Wayback Machine failed:', e.message);
            }
          }

          // Strategy 3: Try Google AMP version via proxies (simpler HTML, often bypasses paywalls)
          if (!extracted) {
            const cleanUrl = url.replace(/\/+$/, '');
            const ampUrl = cleanUrl + '/amp/';
            if (ampUrl !== url) {
              try {
                console.log('Trying AMP version...');
                showToast('Trying AMP version...');
                const ampHtml = await fetchHtmlViaProxies(ampUrl);
                extracted = tryExtractArticle(ampHtml);
                if (extracted) console.log('AMP version succeeded');
              } catch (e) {
                console.log('AMP version failed:', e.message);
              }
            }
          }

          // Google Webcache (webcache.googleusercontent.com) was retired in 2024 and
          // now redirects to a regular Google search results page. Importing that
          // page as the "article" produced garbage entries, so it is not used.

          // Strategy 5: Substack JSON API fallback
          // Substack (and custom-domain Substack sites like latent.space) expose
          // a public post API at <origin>/api/v1/posts/<slug> that returns
          // clean body_html, bypassing the Cloudflare/bot checks that often
          // strip article content from proxy-fetched HTML.
          if (!extracted) {
            try {
              const u = new URL(url.startsWith('http') ? url : 'https://' + url);
              const slugMatch = u.pathname.match(/^\/p\/([^/?#]+)/);
              if (slugMatch) {
                console.log('Trying Substack JSON API...');
                showToast('Trying Substack API...');
                const apiUrl = `${u.origin}/api/v1/posts/${slugMatch[1]}`;
                const apiResponse = await fetchHtmlViaProxies(apiUrl);
                if (apiResponse) {
                  try {
                    const data = JSON.parse(apiResponse);
                    const bodyHtml = data?.body_html || data?.body || '';
                    if (bodyHtml && bodyHtml.length > 100) {
                      const wrappedHtml = `<html><body>${bodyHtml}</body></html>`;
                      extracted = tryExtractArticle(wrappedHtml);
                      if (extracted) {
                        if (data.title) extracted.title = data.title;
                        console.log('Substack JSON API succeeded');
                      }
                    }
                  } catch (e) { /* not Substack or non-JSON response */ }
                }
              }
            } catch (e) {
              console.log('Substack JSON API failed:', e.message);
            }
          }

          if (!extracted) {
            showToast('Could not extract enough content. Try pasting manually.');
            setShowManualInput(true);
            setLoading(false);
            return;
          }

          const { title, text } = extracted;
          const sentences = splitIntoSentences(text);
          sentencesRef.current = sentences;

          addSource({
            type: 'article',
            title: title,
            url: url,
            content: text
          });

          setUrl(''); // Clear URL after successful load
          showToast('Article loaded successfully!');

        } catch (error) {
          console.error('Fetch error:', error);
          showToast('Could not fetch content. Try pasting manually.');
          setShowManualInput(true);
        }

        setLoading(false);
      };

      const handleManualSubmit = async () => {
        if (!manualContent.trim()) return;

        // Only check when a URL is supplied — bare pasted text has no reliable

        if (url && url.trim() && !await checkDuplicateBeforeLoad({ url })) {
          setUrl('');
          setShowManualInput(false);
          setManualContent('');
          return;
        }

        sentencesRef.current = sentences;

          type: 'article',
          title: url || 'Pasted Content',

          content: manualContent
        });

        setUrl(''); // Clear URL after successful load
        setShowManualInput(false);
        setManualContent('');

      // Wake Lock helpers to keep screen on during playback
      const requestWakeLock = async () => {
        try {
          if ('wakeLock' in navigator) {

            if (wakeLockRef.current) {
              try {
                await wakeLockRef.current.release();
              } catch (e) {
                // Ignore errors from releasing
              }
            }

            // Always request fresh wake lock (handles screen on/off cycles)
            wakeLockRef.current = await navigator.wakeLock.request('screen');
            console.log('Wake Lock activated');

            // Listen for release event to clear the ref
            wakeLockRef.current.addEventListener('release', () => {
              console.log('Wake Lock was released');
              wakeLockRef.current = null;
            });

        } catch (err) {
          console.log('Wake Lock not supported or failed:', err);
          wakeLockRef.current = null;
        }
      };

      const releaseWakeLock = async () => {
        try {
          if (wakeLockRef.current) {
            await wakeLockRef.current.release();
            wakeLockRef.current = null;
            console.log('Wake Lock released');
          }
        } catch (err) {
          console.log('Wake Lock release failed:', err);
        }
      };

      const togglePlayback = () => {
        if (isPlaying) {
          wasCancelledRef.current = true;
          window.speechSynthesis.cancel();
          setIsPlaying(false);
          releaseWakeLock();
        } else {
          setAutoScroll(true);
          speakFromIndex(currentSentenceIndex);
        }
      };

      // Get best available voice. Local voices are preferred over remote ones:
      // remote voices (e.g. desktop Chrome's "Google US English") incur a network
      // round-trip per utterance, which manifests as a noticeable pause between
      // sentences. Local voices hand off near-instantly, matching the tight
      // sentence cadence already heard on mobile.
      const getBestVoice = () => {
        const voices = window.speechSynthesis.getVoices();
        if (!voices.length) return null;

        const englishVoices = voices.filter(voice => voice.lang.startsWith('en'));
        const localEnglish = englishVoices.filter(voice => voice.localService);

        // 1. Local Google English voice (e.g. Android "Google US English")
        const localGoogle = localEnglish.find(voice => voice.name.includes('Google'));
        if (localGoogle) return localGoogle;

        // 2. Local Microsoft Natural/Online English voice (Windows 11 Natural voices)
        const localMicrosoftPremium = localEnglish.find(voice =>
          voice.name.includes('Microsoft') &&
          (voice.name.includes('Natural') || voice.name.includes('Online'))
        );
        if (localMicrosoftPremium) return localMicrosoftPremium;

        // 3. Any local English voice (macOS "Samantha", Windows "Microsoft David", iOS voices, etc.)
        if (localEnglish.length) return localEnglish[0];

        // 4. Any local voice in any language (last-resort local before going remote)
        const anyLocal = voices.find(voice => voice.localService);
        if (anyLocal) return anyLocal;

        // 5. Remote fallbacks (original ordering) for users with no local voices installed
        const googleVoice = englishVoices.find(voice => voice.name.includes('Google'));
        if (googleVoice) return googleVoice;

        const microsoftVoice = englishVoices.find(voice =>
          voice.name.includes('Microsoft') &&
          (voice.name.includes('Online') || voice.name.includes('Natural'))
        );
        if (microsoftVoice) return microsoftVoice;

        const anyMicrosoftVoice = englishVoices.find(voice => voice.name.includes('Microsoft'));
        if (anyMicrosoftVoice) return anyMicrosoftVoice;

        return englishVoices[0] || voices[0];
      };

      const speakFromIndex = useCallback((index) => {
        if (!content || index >= content.sentences.length) {
          setIsPlaying(false);
          releaseWakeLock();
          return;
        }

        wasCancelledRef.current = false;
        setIsPlaying(true);
        requestWakeLock(); // Keep screen on during playback
        setCurrentSentenceIndex(index);
        const utterance = new SpeechSynthesisUtterance(content.sentences[index]);
        utterance.rate = speed;

        // Set best available voice
        const bestVoice = getBestVoice();
        if (bestVoice) {
          utterance.voice = bestVoice;
        }

        utterance.onend = () => {
          // Don't continue if speech was intentionally cancelled
          if (wasCancelledRef.current) {
            wasCancelledRef.current = false;
            releaseWakeLock();
            return;
          }
          const nextIndex = index + 1;
          setCurrentSentenceIndex(nextIndex);
          if (nextIndex < content.sentences.length && speakFromIndexRef.current) {
            speakFromIndexRef.current(nextIndex);
          } else {
            setIsPlaying(false);
            releaseWakeLock(); // Release when playback ends
            // Auto-mark as read when reaching the end
            if (currentSource?.id && !currentSource.isRead) {
              updateSource(currentSource.id, { isRead: true });
            }
          }
        };

        // When TTS has actually started speaking the audio-focus situation is
        // established. (Re)playing the silent anchor here lets it coexist with
        // the TTS engine rather than being preempted by it.
        utterance.onstart = () => {
          if ('mediaSession' in navigator) {
            const anchor = MediaSessionManager.silentAudio;
            if (anchor && anchor.paused) {
              anchor._intentionalPause = false;
              anchor.play().catch(() => {});
            }
          }
        };

        utteranceRef.current = utterance;

        // Start TTS first so the speech engine claims its audio-focus slot before
        // we request ours. Placing speak() before play() means our audio arrives
        // as a concurrent stream rather than a competing one that gets preempted.
        window.speechSynthesis.speak(utterance);

        // Also play from the user-gesture call stack so Chrome's autoplay policy
        // is satisfied for the initial unlock of the audio element.
        if ('mediaSession' in navigator) {
          const anchor = MediaSessionManager.initSilentAudio();
          anchor._intentionalPause = false;
          anchor.play().catch(() => {});
        }
      }, [content, speed, currentSource, updateSource]);

      // Keep the ref updated with the latest speakFromIndex function
      useEffect(() => {
        speakFromIndexRef.current = speakFromIndex;
      }, [speakFromIndex]);

      // Apply speed changes immediately while playing
      const prevSpeedRef = useRef(speed);
      useEffect(() => {
        if (prevSpeedRef.current !== speed && isPlaying && speakFromIndexRef.current) {
          // Cancel current speech and restart from current sentence with new speed
          wasCancelledRef.current = true;
          window.speechSynthesis.cancel();
          // Small delay to ensure cancel completes before restarting
          setTimeout(() => {
            speakFromIndexRef.current(currentSentenceIndex);
          }, 50);
        }
        prevSpeedRef.current = speed;
      }, [speed, isPlaying, currentSentenceIndex]);

      // Save speed to source when it changes
      useEffect(() => {
        if (currentSource?.id && speed !== 1) {
          updateSource(currentSource.id, { speed: speed });
        }
      }, [speed, currentSource?.id]);

      // Media Session API for Android Auto / lock screen controls (TTS)
      useEffect(() => {
        if (!('mediaSession' in navigator)) return;

        if (content && currentSource) {
          // Set up action handlers for TTS.
          // All handlers use refs to avoid stale closure issues — this effect only
          // re-runs when content/source changes, not on every isPlaying/index change.
          MediaSessionManager.setActionHandlers({
            onPlay: () => {
              if (window.speechSynthesis.paused) {
                // Resume already-established synthesis. This works from a
                // background media-session handler; starting *new* synthesis
                // via speak() from background is blocked by Chrome's autoplay
                // policy even from trusted media-session events.
                wasCancelledRef.current = false; // allow onend to advance sentences
                window.speechSynthesis.resume();
                setIsPlaying(true);
              } else if (!isPlayingRef.current && speakFromIndexRef.current) {
                speakFromIndexRef.current(currentSentenceIndexRef.current);
              }
            },
            onPause: () => {
              // Use pause() not cancel() so the utterance stays in the queue.
              // resume() can then restart it without needing to call speak(),
              // which is blocked from background media-session handlers.
              wasCancelledRef.current = true;
              window.speechSynthesis.pause();
              setIsPlaying(false);
              releaseWakeLock();
            },
            onSeekBackward: null,
            onSeekForward: null,
            onPreviousTrack: null,
            onNextTrack: null
          });

          // Set metadata
          MediaSessionManager.setMetadata({
            title: content.title || currentSource.title || 'Article',
            artist: currentSource.siteName || 'HarkenJot Reader',
            album: currentSource.type === 'pdf' ? 'PDF' : 'Article',
            artwork: null
          });
        }

        return () => {
          MediaSessionManager.clearHandlers();
        };
      }, [content, currentSource]);

      // Manage silent audio for TTS media session.
      // Mirrors how podcast <audio> works: the browser derives the play/pause
      // button state from the audio element itself — play() → pause button,
      // setPlaybackState controls the play/pause button in the notification.
      // The zero-duration audio must keep looping — pausing it causes Chrome
      // to dismiss the notification entirely (duration=0, nothing to resume).
      useEffect(() => {
        if (!('mediaSession' in navigator)) return;

        if (isPlaying && content) {
          const silentAudio = MediaSessionManager.initSilentAudio();
          silentAudio._intentionalPause = false;
          silentAudio.play().catch(err => console.log('Silent audio play error:', err));
          MediaSessionManager.setPlaybackState('playing');
        } else if (content && MediaSessionManager.silentAudio) {
          // Paused: keep the zero-duration audio looping (so the notification
          // stays visible) and use setPlaybackState to flip the button to play.
          // Do NOT call audio.pause() — that dismisses the notification.
          MediaSessionManager.setPlaybackState('paused');
        } else {
          // No content loaded: fully stop and dismiss notification
          MediaSessionManager.stopSilentAudio();
        }
      }, [isPlaying, content]);

      // Stop silent audio when ReaderView unmounts
      useEffect(() => {
        return () => MediaSessionManager.stopSilentAudio();
      }, []);

      // Update Media Session position state for TTS (sentence-based progress)
      useEffect(() => {
        if (!('mediaSession' in navigator) || !content) return;

        // Approximate duration: 3 seconds per sentence at 1x speed
        const estimatedDuration = content.sentences.length * 3;
        const estimatedPosition = currentSentenceIndex * 3;

        MediaSessionManager.setPositionState({
          duration: estimatedDuration,
          position: estimatedPosition,
          // Use 0 when paused so the browser stops interpolating the progress
          // bar forward and doesn't override playbackState with 'playing'.
          playbackRate: isPlaying ? speed : 0
        });
      }, [currentSentenceIndex, content, speed, isPlaying]);

      const audioContextRef = useRef(null);
      const analyzerRef = useRef(null);
      const silenceTimeoutRef = useRef(null);
      const webSpeechSilenceTimerRef = useRef(null);
      const intentionalStopRef = useRef(false);
      const isProcessing = isRecording || isTranscribing || whisperLoading;

      const stopRecording = () => {
        intentionalStopRef.current = true;
        if (webSpeechSilenceTimerRef.current) {
          clearTimeout(webSpeechSilenceTimerRef.current);
          webSpeechSilenceTimerRef.current = null;
        }
        // Stop Web Speech API recognition or MediaRecorder (Whisper mode)
        if (mediaRecorderRef.current) {
          try {
            playSound('stop');
            mediaRecorderRef.current.stop();
          } catch (err) {
            console.log('Error stopping recognition:', err);
          }
          mediaRecorderRef.current = null;
        }
        // Clean up audio stream if using Whisper
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
      };

      const handleVoiceButtonClick = () => {
        if (isRecording) {
          stopRecording();
        } else if (isTranscribing || whisperLoading) {
          // Provide feedback that we're busy
          playSound('error');
          showToast(whisperLoading ? 'Loading speech model...' : 'Still processing...');
        } else if (isStartingRecordingRef.current) {
          // Prevent concurrent startRecording calls
          playSound('error');
          showToast('Please wait, starting recording...');
        } else {
          startRecording();
        }
      };

      // Load Whisper model for fallback
      const loadWhisperModel = async () => {
        if (window.WhisperASR?.isReady) {
          setUseWhisperFallback(true);
          return true;
        }
        if (whisperLoading) return false;

        setWhisperLoading(true);
        showToast('Loading offline speech model (40MB)...');

        const success = await window.WhisperASR?.loadModel((progress) => {
          setWhisperProgress(progress);
        });

        setWhisperLoading(false);
        if (success) {
          setUseWhisperFallback(true);
          showToast('Offline speech model ready!');
          return true;
        } else {
          showToast('Failed to load offline model');
          return false;
        }
      };

      // Start recording using Whisper (MediaRecorder-based) with silence detection
      const startWhisperRecording = async (wasPlaying, notePosition) => {
        try {
          const audioConstraints = {
            audio: {
              echoCancellation: { ideal: true },
              noiseSuppression: { ideal: true },
              autoGainControl: { ideal: true },
              channelCount: { ideal: 1 },
              sampleRate: { ideal: 16000 }
            }
          };
          const stream = await navigator.mediaDevices.getUserMedia(audioConstraints);
          streamRef.current = stream;

          // Set up silence detection using Web Audio API
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          audioContextRef.current = audioContext;
          const analyser = audioContext.createAnalyser();
          analyzerRef.current = analyser;
          analyser.fftSize = 512;
          analyser.smoothingTimeConstant = 0.1;

          const source = audioContext.createMediaStreamSource(stream);
          source.connect(analyser);

          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          let silenceStart = null;
          let hasDetectedSpeech = false;
          const SILENCE_THRESHOLD = 15; // Audio level below this is considered silence
          const SILENCE_DURATION = 2500; // Stop after 2.5 seconds of silence
          const MAX_RECORDING_TIME = 60000; // Maximum 60 seconds
          const recordingStartTime = Date.now();

          const mimeType = window.WhisperASR?.getSupportedMimeType() || '';
          const mediaRecorder = mimeType
            ? new MediaRecorder(stream, { mimeType })
            : new MediaRecorder(stream);
          mediaRecorderRef.current = mediaRecorder;

          const audioChunks = [];

          // Silence detection loop
          const checkSilence = () => {
            if (!mediaRecorderRef.current || mediaRecorderRef.current.state !== 'recording') {
              return;
            }

            analyser.getByteFrequencyData(dataArray);
            const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

            // Check for max recording time
            if (Date.now() - recordingStartTime > MAX_RECORDING_TIME) {
              console.log('Max recording time reached, stopping');
              mediaRecorderRef.current.stop();
              return;
            }

            if (average > SILENCE_THRESHOLD) {
              // Sound detected
              hasDetectedSpeech = true;
              silenceStart = null;
            } else if (hasDetectedSpeech) {
              // Silence after speech
              if (!silenceStart) {
                silenceStart = Date.now();
              } else if (Date.now() - silenceStart > SILENCE_DURATION) {
                console.log('Silence detected, stopping recording');
                mediaRecorderRef.current.stop();
                return;
              }
            }

            silenceTimeoutRef.current = requestAnimationFrame(checkSilence);
          };

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onerror = (event) => {
            console.error('MediaRecorder error:', event.error);
            if (silenceTimeoutRef.current) {
              cancelAnimationFrame(silenceTimeoutRef.current);
            }
            if (audioContextRef.current) {
              audioContextRef.current.close().catch(() => {});
            }
            showToast('Recording error. Try again.');
            stream.getTracks().forEach(track => track.stop());
            setIsRecording(false);
            isStartingRecordingRef.current = false;
          };

          mediaRecorder.onstop = async () => {
            // Clean up silence detection
            if (silenceTimeoutRef.current) {
              cancelAnimationFrame(silenceTimeoutRef.current);
            }
            if (audioContextRef.current) {
              audioContextRef.current.close().catch(() => {});
              audioContextRef.current = null;
            }

            stream.getTracks().forEach(track => track.stop());
            streamRef.current = null;

            if (audioChunks.length === 0) {
              playSound('error');
              showToast('No audio captured. Try again.');
              setIsRecording(false);
              if (wasPlaying && speakFromIndexRef.current) {
                setTimeout(() => speakFromIndexRef.current(notePosition), 300);
              }
              return;
            }

            const audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });

            if (audioBlob.size < 500) {
              playSound('error');
              showToast('Recording too short. Try again.');
              setIsRecording(false);
              if (wasPlaying && speakFromIndexRef.current) {
                setTimeout(() => speakFromIndexRef.current(notePosition), 300);
              }
              return;
            }

            setIsRecording(false);
            setIsTranscribing(true);

            try {
              const transcript = await window.WhisperASR.transcribe(audioBlob);
              if (transcript && transcript.trim()) {
                const sentence = sentencesRef.current[notePosition];
                const trig = detectNoteTrigger(transcript);
                const noteText = trig.triggered ? trig.cleanedText : transcript.trim();
                const context = trig.triggered && sentence
                  ? sentence
                  : (sentence?.substring(0, 100) + '...');
                addNote({
                  sourceId: currentSource?.id,
                  text: noteText,
                  position: notePosition,
                  context,
                  type: 'voice',
                  fullSentenceCaptured: !!(trig.triggered && sentence)
                });
                playSound('success');
                showToast(trig.triggered && sentence ? 'Full sentence captured' : 'Note saved!');
              } else {
                playSound('error');
                showToast('No speech detected - try speaking louder');
              }
            } catch (error) {
              console.error('Transcription failed:', error);
              playSound('error');
              showToast('Transcription failed. Try again.');
            }
            setIsTranscribing(false);

            if (wasPlaying && speakFromIndexRef.current) {
              setTimeout(() => speakFromIndexRef.current(notePosition), 300);
            }
          };

          mediaRecorder.start(100);
          setIsRecording(true);
          isStartingRecordingRef.current = false;
          playSound('start');
          showToast('Listening (offline mode)...');

          // Start silence detection
          checkSilence();
        } catch (error) {
          console.error('Failed to start Whisper recording:', error);
          playSound('error');
          showToast('Failed to access microphone');
          setIsRecording(false);
          isStartingRecordingRef.current = false;
        }
      };

      const startRecording = async () => {
        console.log('=== startRecording called ===');
        console.log('speechReady:', speechReady, 'useWhisperFallback:', useWhisperFallback);

        if (!speechReady) {
          playSound('error');
          showToast('Speech recognition not available. Use text notes.');
          return;
        }

        if (isStartingRecordingRef.current) {
          return;
        }
        isStartingRecordingRef.current = true;

        stopRecording();

        const wasPlaying = isPlaying;
        const notePosition = currentSentenceIndex;

        if (isPlaying || window.speechSynthesis.speaking) {
          wasCancelledRef.current = true;
          window.speechSynthesis.cancel();
          setIsPlaying(false);
          await new Promise(resolve => setTimeout(resolve, 100));
        }

        // Use Whisper if fallback is enabled or Web Speech has had network errors
        if (useWhisperFallback || window.WebSpeechAPI?.hasNetworkError) {
          if (!window.WhisperASR?.isReady) {
            const loaded = await loadWhisperModel();
            if (!loaded) {
              isStartingRecordingRef.current = false;
              return;
            }
          }
          await startWhisperRecording(wasPlaying, notePosition);
          return;
        }

        // Try Web Speech API (primary)
        try {
          const recognition = window.WebSpeechAPI.createRecognition({
            continuous: true,
            interimResults: true,
            lang: 'en-US'
          });

          let finalTranscript = '';
          let hasResult = false;
          let hadError = false;
          intentionalStopRef.current = false;
          const recordingStartedAt = Date.now();
          const MAX_RECORDING_MS = 60000;

          // Extend pause tolerance: Chrome can fire onend after a final result even
          // with continuous: true, so we (a) only clear the timer on speechstart, not
          // on every result, and (b) auto-restart in onend unless the stop was
          // intentional (user click or our own 2.5s silence timer firing).
          const SPEECH_END_TIMEOUT = 2500;
          const armSilenceTimer = () => {
            if (webSpeechSilenceTimerRef.current) {
              clearTimeout(webSpeechSilenceTimerRef.current);
            }
            webSpeechSilenceTimerRef.current = setTimeout(() => {
              webSpeechSilenceTimerRef.current = null;
              intentionalStopRef.current = true;
              try { recognition.stop(); } catch (err) { /* already stopped */ }
            }, SPEECH_END_TIMEOUT);
          };
          const clearSilenceTimer = () => {
            if (webSpeechSilenceTimerRef.current) {
              clearTimeout(webSpeechSilenceTimerRef.current);
              webSpeechSilenceTimerRef.current = null;
            }
          };

          recognition.onstart = () => {
            console.log('Web Speech recognition started');
            setIsRecording(true);
            isStartingRecordingRef.current = false;
            playSound('start');
            showToast('Listening...');
          };

          recognition.onspeechstart = () => {
            clearSilenceTimer();
          };

          recognition.onspeechend = () => {
            armSilenceTimer();
          };

          recognition.onresult = (event) => {
            hasResult = true;
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
              const transcript = event.results[i][0].transcript;
              if (event.results[i].isFinal) {
                finalTranscript += transcript;
              } else {
                interimTranscript += transcript;
              }
            }
            console.log('Interim:', interimTranscript, 'Final:', finalTranscript);
          };

          recognition.onend = () => {
            // If neither the user nor our silence timer asked us to stop, Chrome
            // ended on its own — try to keep the session alive so mid-note pauses
            // don't terminate the recording.
            const exceededMax = Date.now() - recordingStartedAt > MAX_RECORDING_MS;
            if (!intentionalStopRef.current && !hadError && !exceededMax) {
              try {
                recognition.start();
                return;
              } catch (err) {
                console.warn('Could not restart recognition; finalizing.', err);
              }
            }

            clearSilenceTimer();
            console.log('Web Speech recognition ended');
            setIsRecording(false);
            isStartingRecordingRef.current = false;

            if (hadError) {
              console.log('Skipping onend message - error already handled');
            } else if (finalTranscript.trim()) {
              const sentence = sentencesRef.current[notePosition];
              const trig = detectNoteTrigger(finalTranscript);
              const noteText = trig.triggered ? trig.cleanedText : finalTranscript.trim();
              const context = trig.triggered && sentence
                ? sentence
                : (sentence?.substring(0, 100) + '...');
              addNote({
                sourceId: currentSource?.id,
                text: noteText,
                position: notePosition,
                context,
                type: 'voice',
                fullSentenceCaptured: !!(trig.triggered && sentence)
              });
              playSound('success');
              showToast(trig.triggered && sentence ? 'Full sentence captured' : 'Note saved!');
            } else if (hasResult) {
              playSound('error');
              showToast('No speech detected - try again');
            } else {
              playSound('error');
              showToast('No speech detected - try speaking louder');
            }

            if (wasPlaying && speakFromIndexRef.current) {
              setTimeout(() => speakFromIndexRef.current(notePosition), 300);
            }
          };

          recognition.onerror = (event) => {
            clearSilenceTimer();
            console.error('Speech recognition error:', event.error);
            hadError = true;
            setIsRecording(false);
            isStartingRecordingRef.current = false;

            if (event.error === 'network') {
              // Network error - offer Whisper fallback
              window.WebSpeechAPI.markNetworkError();
              playSound('error');
              showToast('Network error - switching to offline mode...');
              // Automatically try to load Whisper and retry
              loadWhisperModel().then(success => {
                if (success) {
                  showToast('Offline mode ready! Try recording again.');
                }
              });
            } else if (event.error === 'not-allowed' || event.error === 'permission-denied') {
              playSound('error');
              showToast('Microphone access denied');
            } else if (event.error === 'no-speech') {
              playSound('error');
              showToast('No speech detected - try again');
            } else if (event.error === 'aborted') {
              playSound('error');
              showToast('Speech recognition interrupted. Try again.');
            } else if (event.error === 'audio-capture') {
              playSound('error');
              showToast('No microphone found. Check your audio settings.');
            } else {
              playSound('error');
              showToast(`Speech recognition error: ${event.error}`);
            }

            if (wasPlaying && speakFromIndexRef.current) {
              setTimeout(() => speakFromIndexRef.current(notePosition), 300);
            }
          };

          mediaRecorderRef.current = recognition;
          recognition.start();
        } catch (error) {
          console.error('Failed to start speech recognition:', error);
          playSound('error');
          showToast('Speech recognition failed to start');
          setIsRecording(false);
          isStartingRecordingRef.current = false;
        }
      };

      const saveTextNote = () => {
        if (textNote.trim()) {
          const sentence = sentencesRef.current[currentSentenceIndex];
          const trig = detectNoteTrigger(textNote);
          const noteText = trig.triggered ? trig.cleanedText : textNote.trim();
          const context = trig.triggered && sentence
            ? sentence
            : (sentence?.substring(0, 100) + '...');
          addNote({
            sourceId: currentSource?.id,
            text: noteText,
            position: currentSentenceIndex,
            context,
            type: 'text',
            fullSentenceCaptured: !!(trig.triggered && sentence)
          });
          if (trig.triggered && sentence) showToast('Full sentence captured');
          setTextNote('');
          setShowTextNote(false);
        }

        // Resume playback if it was playing before
        if (wasPlayingRef.current && speakFromIndexRef.current) {
          setTimeout(() => speakFromIndexRef.current(currentSentenceIndex), 100);
          wasPlayingRef.current = false;
        }
      };

      const cancelTextNote = () => {
        setShowTextNote(false);
        setTextNote('');

        // Resume playback if it was playing before
        if (wasPlayingRef.current && speakFromIndexRef.current) {
          setTimeout(() => speakFromIndexRef.current(currentSentenceIndex), 100);
          wasPlayingRef.current = false;
        }
      };

      const openTextNote = () => {
        // Store playback state and pause if playing
        if (isPlaying) {
          wasPlayingRef.current = true;
          wasCancelledRef.current = true;
          window.speechSynthesis.cancel();
          setIsPlaying(false);
        } else {
          wasPlayingRef.current = false;
        }
        setShowTextNote(true);
      };

      const progress = content ? (currentSentenceIndex / (content.sentences?.length || 1)) * 100 : 0;
      const notedSentences = new Set(notes.map(n => n.position));

      return (
        <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'hidden' }}>
          <div className="input-section" style={{ display: carMode ? 'none' : 'block' }}>
            <div className="input-group">
              <input
                type="text"
                className="url-input"
                placeholder="Paste URL or load local file..."
                value={url}
                onChange={(e) => setUrl(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && url.trim() && fetchContent()}
              />
              <button className="btn btn-primary" onClick={() => url.trim() ? fetchContent() : loadLocalDocFile()} disabled={loading}>
                {loading ? 'Loading...' : url.trim() ? <><Icons.Link /> Load</> : <><Icons.FolderDown /> Load</>}
              </button>
            </div>

            {showManualInput && (
              <div style={{ marginTop: '0.5rem' }}>
                <textarea
                  ref={manualInputRef}
                  className="url-input"
                  style={{ width: '100%', minHeight: '100px', resize: 'vertical' }}
                  placeholder="Paste article content here..."
                  value={manualContent}
                  onChange={(e) => setManualContent(e.target.value)}
                />
                <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
                  <button className="btn btn-primary" onClick={handleManualSubmit}>
                    <Icons.Plus /> Add to Library
                  </button>
                  <button className="btn btn-secondary" onClick={() => setShowManualInput(false)}>
                    Cancel
                  </button>
                </div>
              </div>
            )}
          </div>

          {content ? (
            <div className="reader-container">
              <div className="reader-header">
                <div className="source-info" style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: '1rem' }}>
                    <EditableTitle
                      title={content.title}
                      onSave={(newTitle) => {
                        if (currentSource) {
                          updateSource(currentSource.id, { title: newTitle });
                        }
                        setContent(prev => ({ ...prev, title: newTitle }));
                      }}
                    />
                    {currentSource && (
                      <div
                        className={`read-status clickable ${currentSource.isRead ? 'checked' : ''}`}
                        onClick={() => updateSource(currentSource.id, { isRead: !currentSource.isRead })}
                        title={currentSource.isRead ? 'Mark as unread' : 'Mark as read'}
                        style={{ marginTop: '0.25rem' }}
                      >
                        {currentSource.isRead && <Icons.Check />}
                      </div>
                    )}
                  </div>
                  <div className="source-meta">
                    <span className={`library-item-type ${currentSource?.type || 'article'}`}>{currentSource?.type || 'Article'}</span>
                    {content.url && <a href={content.url} target="_blank" rel="noopener noreferrer" style={{ color: 'var(--accent)', textDecoration: 'none' }}>{safeHostname(content.url)}</a>}
                    <span>{content.sentences?.length ?? 0} sentences</span>
                    {!sources?.find(s => s.linkedSourceId === currentSource?.id) && (
                      content.url && !content.url.startsWith('blob:') ? (
                        <button type="button" title="Open in NotebookLM (copies URL)" onClick={() => { navigator.clipboard.writeText(content.url).catch(() => {}); window.open('https://notebooklm.google.com/', '_blank', 'noopener noreferrer'); showToast('URL copied — paste into NotebookLM to add as a source'); }}><Icons.NotebookLM /></button>
                      ) : (
                        <button type="button" title="Open NotebookLM" onClick={() => { window.open('https://notebooklm.google.com/', '_blank', 'noopener noreferrer'); }}><Icons.NotebookLM /></button>
                      )
                    )}
                  </div>
                  {(() => {
                    const linkedPodcast = sources?.find(s => s.linkedSourceId === currentSource?.id);
