  <script>
    // Web Speech API for voice recognition
    // This uses the browser's native speech recognition (Google's service on Chrome/Edge)
    const webSpeechAPI = {
      isReady: false,
      isSupported: false,
      hasNetworkError: false,  // Track if we've had network errors

      init() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        this.isSupported = !!SpeechRecognition;
        this.isReady = this.isSupported;

        if (this.isSupported) {
          console.log('Web Speech API is supported');
        } else {
          console.log('Web Speech API is NOT supported in this browser');
        }

        return this.isSupported;
      },

      createRecognition(options = {}) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          throw new Error('Web Speech API not supported');
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = options.continuous ?? false;
        recognition.interimResults = options.interimResults ?? true;
        recognition.lang = options.lang ?? 'en-US';
        recognition.maxAlternatives = options.maxAlternatives ?? 1;

        return recognition;
      },

      markNetworkError() {
        this.hasNetworkError = true;
        console.log('Web Speech API marked as having network error - will suggest Whisper fallback');
      }
    };

    // Initialize and make globally available
    webSpeechAPI.init();
    window.WebSpeechAPI = webSpeechAPI;
    console.log('WebSpeechAPI initialized, supported:', webSpeechAPI.isSupported);
  </script>
  <script>
    // Whisper Speech Recognition using Transformers.js (fallback for when Web Speech API fails)
    // Uses dynamic import to avoid blocking page load if the CDN is unreachable
    (function() {
      let whisperPipeline = null;
      let isLoadingModel = false;
      let transformersModule = null;

      const whisperASR = {
        isReady: false,
        isLoading: false,
        progress: 0,
        error: null,
        available: true, // Will be set to false if module fails to load

        async loadModel(onProgress) {
          if (whisperPipeline) {
            this.isReady = true;
            return true;
          }
          if (isLoadingModel) return false;

          isLoadingModel = true;
          this.isLoading = true;
          this.error = null;

          try {
            // Dynamically import transformers.js only when needed
            if (!transformersModule) {
              console.log('Loading Transformers.js module...');
              transformersModule = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1');
              transformersModule.env.allowLocalModels = false;
              console.log('Transformers.js module loaded');
            }

            console.log('Loading Whisper model...');
            whisperPipeline = await transformersModule.pipeline(
              'automatic-speech-recognition',
              'Xenova/whisper-tiny.en',
              {
                progress_callback: (progress) => {
                  if (progress.status === 'progress') {
                    this.progress = Math.round(progress.progress);
                    if (onProgress) onProgress(this.progress);
                  }
                  console.log('Model load progress:', progress);
                }
              }
            );
            console.log('Whisper model loaded successfully');
            this.isReady = true;
            this.isLoading = false;
            isLoadingModel = false;
            return true;
          } catch (error) {
            console.error('Failed to load Whisper model:', error);
            this.error = error.message;
            this.isLoading = false;
            isLoadingModel = false;
            return false;
          }
        },

        async transcribe(audioBlob) {
          if (!whisperPipeline) {
            throw new Error('Whisper model not loaded');
          }

          try {
            console.log('Transcribing audio...', audioBlob.size, 'bytes, type:', audioBlob.type);

            // Decode audio blob to raw audio samples using Web Audio API
            const arrayBuffer = await audioBlob.arrayBuffer();
            console.log('ArrayBuffer size:', arrayBuffer.byteLength);

            // Try different sample rates - some browsers need native rate first
            let audioContext;
            let audioBuffer;

            try {
              audioContext = new (window.AudioContext || window.webkitAudioContext)();
              if (audioContext.state === 'suspended') {
                await audioContext.resume();
              }
              audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
              console.log('Decoded at native rate:', audioBuffer.sampleRate, 'Hz');
            } catch (e) {
              console.log('Native decode failed, trying 16kHz:', e.message);
              if (audioContext) await audioContext.close().catch(() => {});
              audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
              if (audioContext.state === 'suspended') {
                await audioContext.resume();
              }
              audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
            }

            // Get audio data as Float32Array (mono for Whisper)
            let audioData;
            if (audioBuffer.numberOfChannels > 1) {
              const left = audioBuffer.getChannelData(0);
              const right = audioBuffer.getChannelData(1);
              audioData = new Float32Array(left.length);
              for (let i = 0; i < left.length; i++) {
                audioData[i] = (left[i] + right[i]) / 2;
              }
            } else {
              audioData = audioBuffer.getChannelData(0);
            }

            // Resample to 16kHz if needed (Whisper requires 16kHz)
            if (audioBuffer.sampleRate !== 16000) {
              console.log('Resampling from', audioBuffer.sampleRate, 'to 16000 Hz');
              const ratio = audioBuffer.sampleRate / 16000;
              const newLength = Math.round(audioData.length / ratio);
              const resampled = new Float32Array(newLength);
              for (let i = 0; i < newLength; i++) {
                const srcIndex = Math.floor(i * ratio);
                resampled[i] = audioData[srcIndex];
              }
              audioData = resampled;
            }

            console.log('Audio ready:', audioData.length, 'samples at 16kHz');

            if (audioData.length < 1600) {
              throw new Error('Audio too short');
            }

            const result = await whisperPipeline(audioData, {
              chunk_length_s: 30,
              stride_length_s: 5,
              language: 'english',
              task: 'transcribe',
              sampling_rate: 16000,
            });
            console.log('Transcription result:', result);
            await audioContext.close();
            return result.text || '';
          } catch (error) {
            console.error('Transcription error:', error);
            throw error;
          }
        },

        getSupportedMimeType() {
          const types = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/mp4',
            'audio/ogg;codecs=opus',
            'audio/ogg',
            'audio/wav',
            'audio/mpeg',
            ''
          ];
          for (const type of types) {
            if (type === '' || MediaRecorder.isTypeSupported(type)) {
              console.log('Using audio format:', type || 'browser default');
              return type;
            }
          }
          return '';
        }
      };

      // Make it globally available
      window.WhisperASR = whisperASR;
      console.log('WhisperASR fallback initialized (lazy-loading enabled)');
    })();
  </script>

  <style>
    :root {
      --bg-primary: #faf8f5;
      --bg-secondary: #f4f1eb;
      --bg-tertiary: #ebe7df;
      --text-primary: #2d2a26;
      --text-secondary: #5c5751;
      --text-muted: #8a847a;
      --accent: #c45a3b;
      --accent-hover: #a84830;
      --accent-soft: #f8ebe7;
      --border: #ddd8cf;
      --shadow: rgba(45, 42, 38, 0.08);
      --note-bg: #fff9e6;
      --note-border: #f0e4b8;
      --success: #4a7c59;
      --recording: #c45a3b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      background-blend-mode: overlay;
      background-size: 200px;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
      z-index: 100;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Crimson Pro', serif;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .logo-text {
      font-family: 'Crimson Pro', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .logo-tagline {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: -0.125rem;
    }

    /* Navigation */
    .nav-tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--bg-secondary);
      padding: 0.25rem;
      border-radius: 10px;
    }

    .nav-tab {
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-tab:hover {
      color: var(--text-primary);
    }

    .nav-tab.active {
      background: white;
      color: var(--text-primary);
      box-shadow: 0 2px 8px var(--shadow);
    }

    .notes-button {
      margin-left: auto;
      border: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .notes-button:hover:not(:disabled) {
      background: var(--bg-secondary);
      border-color: var(--accent);
    }

    .notes-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .notes-button.active:not(:disabled) {
      background: var(--accent) !important;
      color: white !important;
      border-color: var(--accent) !important;
      box-shadow: 0 2px 8px var(--shadow);
    }

      grid-template-columns: 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .content-area {
      padding: 1rem 2rem;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      position: fixed;
      right: -360px;
      top: 60px;
      height: calc(100% - 60px);
      height: calc(100dvh - 60px);
      width: 360px;
      padding: 1rem;
      background: var(--bg-secondary);
      overflow-y: auto;
      min-height: 0;
      transition: right 0.3s ease;
      box-shadow: -4px 0 20px var(--shadow);
      z-index: 50;
    }

    .sidebar.open {
      right: 0;
    }

      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .url-input {
      flex: 1;
      min-width: 0;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      background: white;
      transition: all 0.2s ease;
    }

    .url-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .url-input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }

    /* Reader Section */
    .reader-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .reader-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }

    .source-info h2 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      line-height: 1.3;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .source-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .source-meta a {
      color: var(--accent);
      text-decoration: none;
    }

    .source-meta a:hover {
      text-decoration: underline;
    }

    .source-meta button {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }

    .source-meta button:hover {
      opacity: 0.75;
    }

    .relink-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0.5rem 1rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .relink-banner span {
      flex: 1;
    }

    .relink-banner button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .relink-banner button:hover {
      opacity: 0.85;
    }

    .reader-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .reader-body {
      padding: 1rem 1.5rem;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .reader-content {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .reader-content p {
      margin-bottom: 1rem;
    }

    .sentence {
      transition: all 0.2s ease;
      border-radius: 4px;
      padding: 0 2px;
      margin: 0 -2px;
    }

    .sentence.current {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .sentence.has-note {
      background: var(--note-bg);
      border-bottom: 2px solid var(--note-border);
      cursor: pointer;
    }

    .sentence.has-note:hover {
      background: #fff3c4;
    }

    /* Playback Bar */
    .playback-bar {
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .playback-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .transport-buttons {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-speed-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .note-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    @media (max-width: 700px) {
      .playback-controls {
        width: 100%;
        justify-content: center;
      }

      .transport-buttons {
        order: 1;
      }

      .progress-speed-group {
        order: 2;
        flex: 1;
        min-width: 0;
        flex-direction: column;
        gap: 0.25rem;
        align-items: stretch;
      }

      .progress-speed-group .progress-container {
        width: 100%;
      }

      .note-controls {
        order: 3;
        width: 100%;
        justify-content: center;
        padding: 0;
        border: none;
        margin: 0;
      }
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
    }

    .play-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .skip-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .skip-btn:hover:not(:disabled) {
      background: var(--border);
      transform: scale(1.05);
    }

    .skip-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .play-btn.recording {
      background: var(--recording);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196, 90, 59, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(196, 90, 59, 0); }
    }

    .progress-container {
      flex: 1;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.25rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    .progress-text {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.625rem;
      background: white;
      border-radius: 8px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .speed-control label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .speed-control select {
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
    }

    /* Voice Note Button */
    .note-btn {
      padding: 0.5rem 0.5rem;
      background: var(--note-bg);
      border: 2px solid var(--note-border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      transition: all 0.2s ease;
      flex: 1;
      min-height: 44px;
      white-space: nowrap;
    }

    .note-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .note-btn:hover {
      background: #fff3c4;
      border-color: #e6d9a5;
    }

    .note-btn.recording,
    .note-btn.processing {
      background: #fee2e2;
      border-color: var(--recording);
      color: var(--recording);
      animation: pulse-note 1.5s ease infinite;
    }

    @keyframes pulse-note {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196, 90, 59, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(196, 90, 59, 0); }
    }

    /* Note controls responsive */
    .note-controls {
      flex-wrap: nowrap;
    }

    /* Car button - square in regular mode */
    .note-btn:nth-child(4):not(.car-mode) {
      flex: 0 0 auto;
      aspect-ratio: 1;
      padding: 0.5rem;
    }

    /* Car Mode */
    .playback-bar.car-mode {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      padding: 1rem;
      gap: 1rem;
      min-height: 0;
    }

    .playback-bar.car-mode .playback-controls {
      width: 100%;
      flex-direction: column;
      gap: 0.75rem;
      flex: 0 0 auto;
      justify-content: flex-start;
    }

    .playback-bar.car-mode .transport-buttons {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }

    .skip-btn.car-mode,
    .play-btn.car-mode {
      flex: 1;
      max-width: none;
      width: auto;
      height: auto;

    // Utility functions
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const safeHostname = (url) => {
      try {
        return new URL(url).hostname;
      } catch {
        try {
          return new URL('https://' + url).hostname;
        } catch {
          return url;
        }
      }
    };
    const formatDate = (date) => new Date(date).toLocaleDateString('en-US', { 
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });
    const formatTime = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    };
    // Build the title line used in copy/export text. Includes the podcast series
    // (showName) before the episode title so pasted notes identify the show.
    const formatSourceHeader = (source) => {
      if (!source) return '';
      const urlParts = [source.url || source.link || '', source.notebookLMUrl].filter(Boolean);
      const titleLine = source.type === 'podcast' && source.showName
        ? `${source.showName}: ${source.title}`
        : source.title;
      return urlParts.length > 0 ? `${titleLine} (${urlParts.join(', ')})` : titleLine;
    };

    // Trigger phrases that, when present at the start of a note, cause the full
    // source sentence to be captured in the note's context (instead of the
    // default truncated preview). Matched case-insensitively with word-boundary.
    const NOTE_TRIGGER_PHRASES = [
      'quote this', 'quote that',
      'capture this', 'capture that'
    ];
    const detectNoteTrigger = (text) => {
      if (!text) return { triggered: false, cleanedText: '' };
      const trimmed = text.trim();
      const lower = trimmed.toLowerCase();
      for (const phrase of NOTE_TRIGGER_PHRASES) {
        if (lower.startsWith(phrase)) {
          const nextChar = lower.charAt(phrase.length);
          if (nextChar === '' || !/[a-z0-9]/i.test(nextChar)) {
            const cleanedText = trimmed
              .slice(phrase.length)
              .replace(/^[\s,.:;!?\-–—]+/, '')
              .trim();
            return { triggered: true, cleanedText };
          }
        }
      }
      return { triggered: false, cleanedText: trimmed };
    };

    // Score how well an audio filename matches a source title for NotebookLM linking suggestions.
    // Returns { score: 0–1, reason: string|null }
    const scoreSourceMatch = (fileName, sourceTitle) => {
      if (!fileName || !sourceTitle) return { score: 0, reason: null };
      const STOP_WORDS = new Set(['a','an','the','of','in','on','at','to','for','and','or','but','with','by','from','as','is','are','was','were','be','been','it','its','this','that','these','those','i','my','we','our','you','your','about','into','out','up','do','so','no','not','if','can','has','had','have','will','just','also','than']);
      const NOISE_RE = /\b(podcast|notebooklm|notebook\s*lm|audio|deep\s*dive|overview|summary|episode|part\s*\d+)\b/gi;
      const tokenize = (str) => str
        .replace(/\.[^.]+$/, '')          // strip file extension
        .replace(NOISE_RE, ' ')           // remove NotebookLM boilerplate
        .replace(/([a-z])([A-Z])/g, '$1 $2') // split camelCase
        .toLowerCase()
        .split(/[\s\-_.,!?()\[\]]+/)
        .filter(t => t.length > 1 && !STOP_WORDS.has(t));
      const fileTokens = tokenize(fileName);
      const titleTokens = tokenize(sourceTitle);
      if (fileTokens.length === 0 || titleTokens.length === 0) return { score: 0, reason: null };

      // Unigram Jaccard
      const fileSet = new Set(fileTokens);
      const titleSet = new Set(titleTokens);
      let uniShared = 0;
      for (const t of fileSet) { if (titleSet.has(t)) uniShared++; }
      const uniScore = uniShared / Math.max(fileSet.size, titleSet.size);

      // Bigram overlap — consecutive token pairs reward phrase matches like "data density"
      const toBigrams = (tokens) => {
        const bg = new Set();
        for (let i = 0; i < tokens.length - 1; i++) bg.add(tokens[i] + '|' + tokens[i + 1]);
        return bg;
      };
      const fileBigrams = toBigrams(fileTokens);
      const titleBigrams = toBigrams(titleTokens);
      let biShared = 0;
      for (const bg of fileBigrams) { if (titleBigrams.has(bg)) biShared++; }
      const biScore = (fileBigrams.size > 0 && titleBigrams.size > 0)
        ? biShared / Math.max(fileBigrams.size, titleBigrams.size)
        : 0;

      // Equal blend: phrase matches count as much as word matches in aggregate
      const score = uniScore * 0.5 + biScore * 0.5;
      const reason = biShared > 0 ? 'Phrase match' : (uniShared > 0 ? 'Title match' : null);
      return { score, reason };
    };

    // Persistent storage backed by IndexedDB. Replaces localStorage (~5 MB cap)
    // with a much larger quota. All callers expect a synchronous get(), so we
    // hydrate the entire keyspace into an in-memory cache during init() and
    // write through to IDB asynchronously on each set().
    const HJStore = {
      _cache: {},
      _db: null,
      _ready: false,
      _dbName: 'harkenjot',
      _store: 'kv',
      _keys: ['sources', 'notes', 'positions', 'media_positions'],
      _lsKey: {
        sources: 'harkenjot_sources',
        notes: 'harkenjot_notes',
        positions: 'harkenjot_positions',
        media_positions: 'harkenjot_media_positions',
      },

      _open() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(this._dbName, 1);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(this._store)) db.createObjectStore(this._store);
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      },
      _idbGet(key) {
        return new Promise((resolve, reject) => {
          const tx = this._db.transaction(this._store, 'readonly');
          const req = tx.objectStore(this._store).get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      },
      _idbPut(key, value) {
        return new Promise((resolve, reject) => {
          const tx = this._db.transaction(this._store, 'readwrite');
          const req = tx.objectStore(this._store).put(value, key);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      },

      // Seed the in-memory cache from localStorage. Used as a fallback when
      // IDB is unavailable, and during the first-run migration into IDB.
      _seedFromLocalStorage() {
        // Honor the legacy 'marginalia_' → 'harkenjot_' rename first.
        try {
          ['sources', 'notes'].forEach(k => {
            const oldRaw = localStorage.getItem('marginalia_' + k);
            if (oldRaw && !localStorage.getItem('harkenjot_' + k)) {
              localStorage.setItem('harkenjot_' + k, oldRaw);
              localStorage.removeItem('marginalia_' + k);
            }
          });
        } catch (e) { /* best-effort */ }
        this._keys.forEach(k => {
          if (this._cache[k] !== undefined) return;
          try {
            const raw = localStorage.getItem(this._lsKey[k]);
            if (raw) this._cache[k] = JSON.parse(raw);
          } catch (e) { /* corrupted entry — skip */ }
        });
      },

      // Strip 'sentences' arrays from cached sources (derived at runtime from
      // 'content' via splitIntoSentences). Reclaims ~40% of the sources payload.
      _stripSentences() {
        const sources = this._cache.sources;
        if (!Array.isArray(sources)) return false;
        let changed = false;
        sources.forEach(s => { if (s.sentences) { delete s.sentences; changed = true; } });
        return changed;
      },

      async init() {
        try {
          this._db = await this._open();
        } catch (e) {
          console.error('IndexedDB unavailable; using localStorage fallback', e);
          this._seedFromLocalStorage();
          this._stripSentences();
          this._ready = true;
          return;
        }
        // Hydrate cache from IDB.
        try {
          for (const k of this._keys) {
            const v = await this._idbGet(k);
            if (v !== undefined) this._cache[k] = v;
          }
        } catch (e) {
          console.error('IndexedDB read failed:', e);
        }
        // First-run migration: copy any localStorage values that aren't in IDB
        // yet. Leave the localStorage entries in place as a one-release safety
        // net so a future patch can clear them after the migration is verified.
        const before = JSON.stringify(Object.keys(this._cache).sort());
        this._seedFromLocalStorage();
        const after = JSON.stringify(Object.keys(this._cache).sort());
        if (before !== after) {
          for (const k of this._keys) {
            if (this._cache[k] !== undefined) {
              try { await this._idbPut(k, this._cache[k]); } catch (e) { console.error('Migration write failed for', k, e); }
            }
          }
        }
        // One-time pass to remove redundant 'sentences' arrays from sources.
        if (this._stripSentences()) {
          try { await this._idbPut('sources', this._cache.sources); } catch (e) { /* ignore */ }
        }
        // Best-effort: ask the browser to mark our IDB data as non-evictable.
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persist().catch(() => {});
        }
        this._ready = true;
      },

      get(key) { return this._cache[key]; },

      // Update the cache immediately and fire an async write to IDB. Returns
      // a promise so callers can await persistence if needed.
      set(key, value) {
        this._cache[key] = value;
        if (!this._db) return Promise.resolve();
        return this._idbPut(key, value);
      },
    };

    // Returns { usage, quota } in bytes via the Storage API. Falls back to a
    // rough char count over localStorage when the API is unavailable.
    const getStorageUsage = async () => {
      if (navigator.storage && navigator.storage.estimate) {
        const est = await navigator.storage.estimate();
        return { usage: est.usage || 0, quota: est.quota || 0 };
      }
      let chars = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        chars += k.length + (localStorage.getItem(k) || '').length;
      }
      return { usage: chars, quota: 5 * 1024 * 1024 };
    };

    // Detect PDF URLs by extension or known academic/research URL patterns
    const isPdfUrl = (url) => {
      const lower = url.toLowerCase();
      // Direct .pdf extension or .pdf with query/hash params
      if (lower.endsWith('.pdf') || /\.pdf[?#]/.test(lower)) return true;
      // Known academic/research PDF URL patterns
      const pdfPatterns = [
        /arxiv\.org\/pdf\//,
        /biorxiv\.org\/content\/.*\.full/,
        /medrxiv\.org\/content\/.*\.full/,
        /dl\.acm\.org\/doi\/pdf\//,
        /openreview\.net\/pdf/,
        /papers\.nips\.cc\/paper.*\/file\//,
        /ieeexplore\.ieee\.org\/stamp\/stamp\.jsp/,
        /ncbi\.nlm\.nih\.gov\/pmc\/articles\/.*\/pdf/,
        /link\.springer\.com\/content\/pdf\//,
        /pdfs\.semanticscholar\.org\//,
      ];
      return pdfPatterns.some(p => p.test(lower));
    };

    // Detect ForumMagnum sites (LessWrong, Alignment Forum, EA Forum) which expose a public GraphQL API
    const isForumMagnumUrl = (url) => {
      try {
        const h = safeHostname(url);
        return (
          h === 'www.lesswrong.com' || h === 'lesswrong.com' ||
          h === 'www.alignmentforum.org' || h === 'alignmentforum.org' ||
          h === 'forum.effectivealtruism.org'
        );
      } catch { return false; }
    };

    // Toast Component
    function Toast({ message, show, onUndo, showUndo }) {
      return (
        <div className={`toast ${show ? 'show' : ''}`}>
          <span>{message}</span>
          {showUndo && onUndo && (
            <button className="undo-btn" onClick={onUndo}>
              Undo
            </button>
          )}
        </div>
      );
    }

    // Audio feedback utility
    const playSound = (type) => {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.type = 'sine';
        gainNode.gain.value = 0.3; // Volume

        const now = audioContext.currentTime;

        if (type === 'start') {
          // High beep for start recording
          oscillator.frequency.value = 800;
          gainNode.gain.setValueAtTime(0.3, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          oscillator.start(now);
          oscillator.stop(now + 0.1);
        } else if (type === 'stop') {
          // Low beep for stop recording
          oscillator.frequency.value = 400;
          gainNode.gain.setValueAtTime(0.3, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          oscillator.start(now);
          oscillator.stop(now + 0.1);
        } else if (type === 'success') {
          // Two-tone chime for success
          oscillator.frequency.setValueAtTime(523, now);
          oscillator.frequency.setValueAtTime(659, now + 0.1);
          gainNode.gain.setValueAtTime(0.3, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          oscillator.start(now);
          oscillator.stop(now + 0.3);
        } else if (type === 'error') {
          // Low buzz for error
          oscillator.type = 'square';
          oscillator.frequency.value = 200;
          gainNode.gain.setValueAtTime(0.2, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          oscillator.start(now);
          oscillator.stop(now + 0.2);
        }
      } catch (err) {
        console.log('Audio feedback unavailable:', err);
      }
    };

    // Media Session API utility for Android Auto / lock screen controls
    const MediaSessionManager = {
      // Silent audio element for TTS media session activation
      silentAudio: null,

      // Initialize silent audio for TTS (anchors the media session so Chrome shows
      // the lock-screen / notification controls while TTS is playing).
      initSilentAudio: () => {
        if (MediaSessionManager.silentAudio) return MediaSessionManager.silentAudio;

        // Use a zero-duration silent WAV that loops.
        // Intentionally zero-duration: because it produces no real audio output,
        // Android's AudioManager never registers it as an active audio stream.
        // This means the TTS engine (speechSynthesis) can claim its own audio-focus
        // slot without pausing this element — the two coexist without conflict.
        // Chrome's media session still sees the element in "playing" state on each
        // loop iteration and keeps the notification visible.
        // A real WAV with non-zero duration DOES trigger AudioManager and gets
        // paused the moment speechSynthesis speaks, killing the notification.
        const audio = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
        audio.loop = true;
        audio.volume = 0.01; // Near-silent; must be > 0 or some browsers ignore it
        audio._intentionalPause = false;

        // Auto-recover from unintentional pauses (e.g. another audio source
        // briefly interrupting focus). An _intentionalPause flag prevents
        // fighting against deliberate pause() calls.
        audio.addEventListener('pause', () => {
          setTimeout(() => {
            if (audio.paused && !audio._intentionalPause) {
              audio.play().catch(() => {});
            }
          }, 50);
        });

        MediaSessionManager.silentAudio = audio;
        return audio;
      },

      // Set metadata for the current media
      setMetadata: ({ title, artist, album, artwork }) => {
        if (!('mediaSession' in navigator)) return;

        try {
          const metadata = {
            title: title || 'Unknown',
            artist: artist || 'HarkenJot',
            album: album || ''
          };

          // Add artwork if provided
          if (artwork) {
            metadata.artwork = [
              { src: artwork, sizes: '96x96', type: 'image/png' },
              { src: artwork, sizes: '128x128', type: 'image/png' },
              { src: artwork, sizes: '192x192', type: 'image/png' },
              { src: artwork, sizes: '256x256', type: 'image/png' },
              { src: artwork, sizes: '384x384', type: 'image/png' },
              { src: artwork, sizes: '512x512', type: 'image/png' }
            ];
          }

          navigator.mediaSession.metadata = new MediaMetadata(metadata);
        } catch (err) {
          console.log('Media Session metadata error:', err);
        }
      },

      // Set playback state
      setPlaybackState: (state) => {
        if (!('mediaSession' in navigator)) return;
        try {
          navigator.mediaSession.playbackState = state; // 'playing', 'paused', 'none'
        } catch (err) {
          console.log('Media Session playback state error:', err);
        }
      },

      // Set position state for seekable media
      setPositionState: ({ duration, position, playbackRate }) => {
        if (!('mediaSession' in navigator)) return;
        try {
          if (duration && isFinite(duration) && duration > 0) {
            navigator.mediaSession.setPositionState({
              duration: duration,
              position: Math.min(position || 0, duration),
              playbackRate: playbackRate || 1
            });
          }
        } catch (err) {
          console.log('Media Session position error:', err);
        }
      },

      // Set action handlers
      setActionHandlers: ({ onPlay, onPause, onSeekBackward, onSeekForward, onPreviousTrack, onNextTrack }) => {
        if (!('mediaSession' in navigator)) return;

        const handlers = [
          ['play', onPlay],
          ['pause', onPause],
          ['seekbackward', onSeekBackward],
          ['seekforward', onSeekForward],
          ['previoustrack', onPreviousTrack],
          ['nexttrack', onNextTrack]
        ];

        handlers.forEach(([action, handler]) => {
          try {
            navigator.mediaSession.setActionHandler(action, handler || null);
          } catch (err) {
            console.log(`Media Session handler '${action}' not supported:`, err);
          }
        });
      },

      // Clear all handlers
      clearHandlers: () => {
        if (!('mediaSession' in navigator)) return;

        const actions = ['play', 'pause', 'seekbackward', 'seekforward', 'previoustrack', 'nexttrack'];
        actions.forEach(action => {
          try {
            navigator.mediaSession.setActionHandler(action, null);
          } catch (err) {
            // Ignore errors when clearing
          }
        });
      },

      // Stop silent audio (for TTS cleanup)
      stopSilentAudio: () => {
        if (MediaSessionManager.silentAudio) {
          MediaSessionManager.silentAudio._intentionalPause = true;
          MediaSessionManager.silentAudio.pause();
          MediaSessionManager.silentAudio.currentTime = 0;
        }
      }
    };

    // Main App
    function App() {
      const [activeTab, setActiveTab] = useState('library');
      // HJStore.init() runs before ReactDOM.render, so the cache is already populated.
      const [sources, setSources] = useState(() => HJStore.get('sources') || []);
      const [currentSource, setCurrentSource] = useState(null);
      const [notes, setNotes] = useState(() => HJStore.get('notes') || []);
      const [toast, setToast] = useState({ show: false, message: '' });
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [undoData, setUndoData] = useState(null);
      const [carMode, setCarMode] = useState(false);
      const [isMobileDevice, setIsMobileDevice] = useState(false);
      const [pendingNotebookLMModal, setPendingNotebookLMModal] = useState(false);

      const readerRef = useRef(null);
      const mediaRef = useRef(null);
      const undoTimeoutRef = useRef(null);
      const storageWarningShownRef = useRef(false);

      // Tab navigation with browser history support
      const changeTab = useCallback((tab) => {
        setActiveTab(tab);
        history.pushState({ tab }, '');
      }, []);

      // Set initial history state and listen for back/forward button
      useEffect(() => {
        history.replaceState({ tab: 'library' }, '');
        const handlePopState = (event) => {
          setActiveTab(event.state?.tab || 'library');
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      // Detect if user is on a mobile device
      useEffect(() => {
        const checkMobile = () => {
          const userAgent = navigator.userAgent || navigator.vendor || window.opera;
          // Check for mobile devices (iOS, Android, Windows Phone)
          const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase());
          setIsMobileDevice(isMobile);
        };
        checkMobile();
      }, []);

      // Persist sources to IndexedDB and check usage against browser quota.
      useEffect(() => {
        HJStore.set('sources', sources).catch((e) => {
          console.error('Failed to save sources:', e);
          if (e && e.name === 'QuotaExceededError') showToast('Storage full — changes may not persist. Export your library and delete old sources to free space.');
        });
        if (!storageWarningShownRef.current) {
          getStorageUsage().then(({ usage, quota }) => {
            if (quota && usage > quota * 0.8) {
              storageWarningShownRef.current = true;
              const usedMB = (usage / (1024 * 1024)).toFixed(1);
              const quotaMB = (quota / (1024 * 1024)).toFixed(0);
              showToast(`Storage is ${usedMB}MB of ~${quotaMB}MB — approaching browser limit. Export your library and remove old sources to free space.`);
            }
          }).catch(() => { /* estimate is best-effort */ });
        }
      }, [sources]);

      useEffect(() => {
        HJStore.set('notes', notes).catch((e) => {
          console.error('Failed to save notes:', e);
          if (e && e.name === 'QuotaExceededError') showToast('Storage full — notes may not persist. Export your library and delete old sources to free space.');
        });
      }, [notes]);

      // Close sidebar when changing tabs
      useEffect(() => {
        setSidebarOpen(false);
      }, [activeTab]);

      // Ensure voices are loaded
      useEffect(() => {
        // Load voices immediately if available
        const voices = window.speechSynthesis.getVoices();

        // Some browsers load voices asynchronously
        if (!voices.length) {
          window.speechSynthesis.addEventListener('voiceschanged', () => {
            window.speechSynthesis.getVoices();
          }, { once: true });
        }
      }, []);

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: '' }), 3000);
      };

      const addSource = (source) => {
        const newSource = { ...source, id: generateId(), createdAt: new Date().toISOString() };
        setSources(prev => [newSource, ...prev]);
        setCurrentSource(newSource);
        showToast('Source added to library');
        return newSource;
      };

      // Duplicate detection: loaders call checkDuplicateBeforeLoad before doing
      // any heavy fetching/processing. If a match is found in the library, a
      // styled confirmation modal asks whether to add another copy or open the
      // existing source. Match keys: normalized URL, videoId (YouTube),
      // xVideoId (X video), or localFile + fileName + type (local audio).
      const [duplicateModal, setDuplicateModal] = useState(null);

      const findDuplicateSource = useCallback((candidate) => {
        if (!candidate) return null;
        const normalizeUrl = (u) => (u || '').trim().toLowerCase().replace(/#.*$/, '').replace(/\/$/, '');
        const urlA = normalizeUrl(candidate.url);
        if (urlA) {
          const dup = sources.find(s => normalizeUrl(s.url) === urlA);
          if (dup) return dup;
        }
        if (candidate.videoId) {
          const dup = sources.find(s => s.videoId && s.videoId === candidate.videoId);
          if (dup) return dup;
        }
        if (candidate.xVideoId) {
          const dup = sources.find(s => s.xVideoId && s.xVideoId === candidate.xVideoId);
          if (dup) return dup;
        }
        if (candidate.localFile && candidate.fileName) {
          const dup = sources.find(s => s.localFile && s.fileName === candidate.fileName && s.type === candidate.type);
          if (dup) return dup;
        }
        return null;
      }, [sources]);

      const openExistingSource = useCallback((source) => {
        setCurrentSource(source);
        const isMedia = source.type === 'youtube' || source.type === 'podcast' || source.type === 'xvideo';
        changeTab(isMedia ? 'media' : 'reader');
      }, [changeTab]);

      const checkDuplicateBeforeLoad = useCallback(async (candidate) => {
        const existing = findDuplicateSource(candidate);
        if (!existing) return true;
        const proceed = await new Promise((resolve) => {
          setDuplicateModal({ existing, resolve });
        });
        if (!proceed) {
          openExistingSource(existing);
          showToast('Opened existing source');
          return false;
        }
        return true;
      }, [findDuplicateSource, openExistingSource]);

      const updateSource = (sourceId, updates) => {
        setSources(prev => prev.map(s => s.id === sourceId ? { ...s, ...updates } : s));
        setCurrentSource(prev => prev?.id === sourceId ? { ...prev, ...updates } : prev);
      };

      const addNote = (note) => {
        const newNote = { ...note, id: generateId(), createdAt: new Date().toISOString() };
        setNotes(prev => {
          // Insert note in sequential order among notes for the same source
          const otherNotes = prev.filter(n => n.sourceId !== newNote.sourceId);
          const sourceNotes = prev.filter(n => n.sourceId === newNote.sourceId);

          // Find insertion index based on position (articles/PDFs) or timestamp (media)
          let insertIdx = sourceNotes.length;
          for (let i = 0; i < sourceNotes.length; i++) {
            const existing = sourceNotes[i];
            if (newNote.timestamp !== undefined && existing.timestamp !== undefined) {
              if (newNote.timestamp < existing.timestamp) { insertIdx = i; break; }
            } else if (newNote.position !== undefined && existing.position !== undefined) {
              if (newNote.position < existing.position) { insertIdx = i; break; }
            }
          }

          sourceNotes.splice(insertIdx, 0, newNote);
          return [...sourceNotes, ...otherNotes];
        });
        showToast('Note saved');
      };

      const deleteNote = (noteId) => {
        const noteToDelete = notes.find(n => n.id === noteId);
        if (!noteToDelete) return;

        setNotes(prev => prev.filter(n => n.id !== noteId));

        // Set up undo
        clearTimeout(undoTimeoutRef.current);
        setUndoData({ type: 'note', data: noteToDelete });
        setToast({ show: true, message: 'Note deleted', showUndo: true });

        // Auto-clear undo after 5 seconds
        undoTimeoutRef.current = setTimeout(() => {
          setUndoData(null);
          setToast({ show: false, message: '', showUndo: false });
        }, 5000);
      };

      const updateNote = (noteId, updatedText) => {
        setNotes(prev => prev.map(n =>
          n.id === noteId ? { ...n, text: updatedText } : n
        ));
        showToast('Note updated');
      };

      const handleUndo = () => {
        if (!undoData) return;

        clearTimeout(undoTimeoutRef.current);

        if (undoData.type === 'note') {
          setNotes(prev => [undoData.data, ...prev]);
          showToast('Note restored');
        } else if (undoData.type === 'source') {
          setSources(prev => [undoData.data.source, ...prev]);
          setNotes(prev => [...undoData.data.notes, ...prev]);
          showToast('Item restored');
        }

        setUndoData(null);
      };

      const navigateToNote = (note) => {
        setSidebarOpen(false);

        if (note.timestamp !== undefined) {
          // Video note - seek to timestamp
          changeTab('media');
          setTimeout(() => {
            if (mediaRef.current?.seekTo) {
              mediaRef.current.seekTo(note.timestamp);
            }
          }, 100);
        } else if (note.position !== undefined) {
          // Article/PDF note - go to sentence
          changeTab('reader');
          setTimeout(() => {
            if (readerRef.current?.navigateToSentence) {
              readerRef.current.navigateToSentence(note.position);
            }
          }, 100);
        }
      };

      const deleteSource = (sourceId) => {
        const sourceToDelete = sources.find(s => s.id === sourceId);
        if (!sourceToDelete) return;

        const relatedNotes = notes.filter(n => n.sourceId === sourceId);

        setSources(prev => prev.filter(s => s.id !== sourceId));
        setNotes(prev => prev.filter(n => n.sourceId !== sourceId));
        if (currentSource?.id === sourceId) {
          setCurrentSource(null);
        }

        // Set up undo
        clearTimeout(undoTimeoutRef.current);
        setUndoData({ type: 'source', data: { source: sourceToDelete, notes: relatedNotes } });
        setToast({ show: true, message: 'Item deleted from library', showUndo: true });

        // Auto-clear undo after 5 seconds
        undoTimeoutRef.current = setTimeout(() => {
          setUndoData(null);
          setToast({ show: false, message: '', showUndo: false });
        }, 5000);
      };

      const currentNotes = notes.filter(n => n.sourceId === currentSource?.id).sort((a, b) => {
        // Sort notes sequentially by source position (earliest in source first)
        if (a.timestamp !== undefined && b.timestamp !== undefined) {
          return a.timestamp - b.timestamp;
        }
        if (a.position !== undefined && b.position !== undefined) {
          return a.position - b.position;
        }
        // Fallback: maintain creation order
        return new Date(a.createdAt) - new Date(b.createdAt);
      });

      // Determine if notes button should be enabled based on current tab and source type
      const isNotesAvailable = (() => {
        if (activeTab === 'library') return false;
        if (!currentSource) return false;
        if (activeTab === 'reader') {
          return currentSource.type === 'article' || currentSource.type === 'pdf';
        }
        if (activeTab === 'media') {
          return currentSource.type === 'youtube' || currentSource.type === 'podcast' || currentSource.type === 'xvideo';
        }
        return false;
      })();

      return (
        <div className="app-container">
          <header className="header">
            <div className="logo">
              <div className="logo-icon">H</div>
              <div>
                <div className="logo-text">HarkenJot <span style={{ fontSize: '0.6rem', color: 'var(--text-muted)', fontWeight: 400 }}>v1.26.1</span></div>
                <div className="logo-tagline">Take Notes While You Listen</div>
              </div>
            </div>
            <nav className="nav-tabs">
              <button
                className={`nav-tab ${activeTab === 'reader' ? 'active' : ''}`}
                onClick={() => { changeTab('reader'); setCarMode(false); }}
              >
                <Icons.BookOpen /> Reader
              </button>
              <button
                className={`nav-tab ${activeTab === 'media' ? 'active' : ''}`}
                onClick={() => { changeTab('media'); setCarMode(false); }}
              >
                <Icons.Podcast /> Player
              </button>
              <button
                className={`nav-tab ${activeTab === 'library' ? 'active' : ''}`}
                onClick={() => { changeTab('library'); setCarMode(false); }}
              >
                <Icons.Library /> Library
              </button>
              <button
                className={`nav-tab notes-button ${sidebarOpen && isNotesAvailable ? 'active' : ''} ${!isNotesAvailable ? 'disabled' : ''}`}
                onClick={() => { if (isNotesAvailable) { setSidebarOpen(!sidebarOpen); setCarMode(false); }}}
                disabled={!isNotesAvailable}
                style={{ position: 'relative' }}
                title={!isNotesAvailable ? (activeTab === 'library' ? 'Notes not available in library view' : 'Load a source to view notes') : 'Toggle notes'}
              >
                <Icons.Pencil /> Notes
                {isNotesAvailable && currentNotes.length > 0 && (
                  <span style={{
                    position: 'absolute',
                    top: '2px',
                    right: '2px',
                    background: 'var(--accent)',
                    color: 'white',
                    fontSize: '0.6rem',
                    minWidth: '14px',
                    height: '14px',
                    borderRadius: '7px',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center'
                  }}>{currentNotes.length}</span>
                )}
              </button>
            </nav>
          </header>

          <main className="main-content">
            <div className="content-area">
              <div style={{ display: activeTab === 'reader' ? 'flex' : 'none', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'hidden' }}>
                <ReaderView
                  key={currentSource?.id ?? 'none'}
                  ref={readerRef}
                  currentSource={currentSource}
                  setCurrentSource={setCurrentSource}
                  addSource={addSource}
                  updateSource={updateSource}
                  addNote={addNote}
                  notes={currentNotes}
                  sources={sources}
                  setActiveTab={changeTab}
                  showToast={showToast}
                  carMode={carMode}
                  setCarMode={setCarMode}
                  isMobileDevice={isMobileDevice}
                  checkDuplicateBeforeLoad={checkDuplicateBeforeLoad}
                />
              </div>
              <div style={{ display: activeTab === 'media' ? 'flex' : 'none', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'hidden' }}>
                <MediaView
                  key={currentSource?.id ?? 'none'}
                  ref={mediaRef}
                  currentSource={currentSource}
                  setCurrentSource={setCurrentSource}
                  addSource={addSource}
                  updateSource={updateSource}
                  addNote={addNote}
                  notes={currentNotes}
                  sources={sources}
                  showToast={showToast}
                  setActiveTab={changeTab}
                  carMode={carMode}
                  setCarMode={setCarMode}
                  isMobileDevice={isMobileDevice}
                  pendingNotebookLMModal={pendingNotebookLMModal}
                  setPendingNotebookLMModal={setPendingNotebookLMModal}
                  checkDuplicateBeforeLoad={checkDuplicateBeforeLoad}
                />
              </div>
              <div style={{ display: activeTab === 'library' ? 'flex' : 'none', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'hidden' }}>
                <LibraryView
                  sources={sources}
                  notes={notes}
                  setCurrentSource={(source) => {
                    setCurrentSource(source);
                    changeTab(source.type === 'youtube' || source.type === 'podcast' || source.type === 'xvideo' ? 'media' : 'reader');
                  }}
                  openSourceWithNotes={(source) => {
                    setCurrentSource(source);
                    changeTab(source.type === 'youtube' || source.type === 'podcast' || source.type === 'xvideo' ? 'media' : 'reader');
                    // Delay sidebar open to run after the useEffect that closes sidebar on tab change
                    setTimeout(() => setSidebarOpen(true), 0);
                  }}
                  deleteNote={deleteNote}
                  deleteSource={deleteSource}
                  updateSource={updateSource}
                  setSources={setSources}
                  setNotes={setNotes}
                  showToast={showToast}
                />
              </div>
            </div>

            <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
              <NoteSidebar
                notes={currentNotes}
                currentSource={currentSource}
                deleteNote={deleteNote}
                updateNote={updateNote}
                navigateToNote={navigateToNote}
                showToast={showToast}
                onClose={() => setSidebarOpen(false)}
              />
            </aside>
          </main>

          <Toast {...toast} onUndo={handleUndo} />
          <DuplicateConfirmModal
            existing={duplicateModal?.existing}
            onConfirm={() => { const r = duplicateModal?.resolve; setDuplicateModal(null); r && r(true); }}
            onCancel={() => { const r = duplicateModal?.resolve; setDuplicateModal(null); r && r(false); }}
          />
        </div>
      );
    }

    // Editable Title Component
    const EditableTitle = ({ title, onSave, style = {} }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [editValue, setEditValue] = useState(title);
      const inputRef = useRef(null);

      useEffect(() => {
        setEditValue(title);
      }, [title]);

      useEffect(() => {
        if (isEditing && inputRef.current) {
          inputRef.current.focus();
          inputRef.current.select();
        }
      }, [isEditing]);

      const handleSave = () => {
        const trimmedValue = editValue.trim();
        if (trimmedValue && trimmedValue !== title) {
          onSave(trimmedValue);
        } else {
          setEditValue(title);
        }
        setIsEditing(false);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') {
          handleSave();
        } else if (e.key === 'Escape') {
          setEditValue(title);
          setIsEditing(false);
        }
      };

      if (isEditing) {
        return (
          <input
            ref={inputRef}
            type="text"
            value={editValue}
            onChange={(e) => setEditValue(e.target.value)}
            onBlur={handleSave}
            onKeyDown={handleKeyDown}
            className="editable-title-input"
            style={{
              flex: 1,
              fontSize: 'inherit',
              fontWeight: 'inherit',
              fontFamily: 'inherit',
              padding: '0.25rem 0.5rem',
              border: '2px solid var(--accent)',
              borderRadius: '6px',
              background: 'white',
              outline: 'none',
              ...style
            }}
          />
        );
      }

      return (
        <h2
          onClick={() => setIsEditing(true)}
          title="Click to edit title"
          style={{
            flex: 1,
            cursor: 'pointer',
            ...style
          }}
        >
          {title}
        </h2>
      );

    const NotebookLMModal = ({ show, sources, currentSource, defaultStep = 'ask', onConfirmNotebookLM, onSaveUrl, onLinkSource, onClose }) => {

          const ageMs = now - new Date(s.createdAt).getTime();
          const recencyScore = ageMs < SEVEN_DAYS_MS ? (1 - ageMs / SEVEN_DAYS_MS) : 0;
          const finalScore = titleScore * 0.93 + recencyScore * 0.07;
