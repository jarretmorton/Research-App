                    disabled={!speechReady || whisperLoading}
                    title={!speechReady ? 'Speech recognition not supported' : (useWhisperFallback ? 'Using offline mode' : '')}
                  >
                    {isRecording ? '⏹ Stop' :
                     whisperLoading ? `Loading ${whisperProgress}%` :
                     isTranscribing ? 'Processing...' :
                     <><Icons.Mic /> Voice{useWhisperFallback ? ' (offline)' : ''}</>}
                  </button>
                  <button
                    className={`note-btn ${carMode ? 'car-mode' : ''}`}
                    onClick={openTextNote}
                  >
                    <Icons.Keyboard /> Type
                  </button>
                  <button
                    className={`note-btn ${carMode ? 'car-mode' : ''}`}
                    disabled={true}
                    title="Search not available for podcasts"
                    style={{ opacity: 0.5 }}
                  >
                    <Icons.Search /> Search
                  </button>
                  {isMobileDevice && (
                    <button
                      className={`note-btn ${carMode ? 'car-mode active' : ''}`}
                      onClick={() => setCarMode(!carMode)}
                      title="Car Mode"
                    >
                      <Icons.Car />
                    </button>
                  )}
                </div>
              </div>
            </div>
          ) : (
            <div className="empty-state">
              <div className="empty-state-icon">🎙️</div>
              <h3>Media Player</h3>
              <p>Paste a YouTube, X.com, Spotify, or podcast RSS feed link above, or load a local audio file to begin. The app will play it and let you take notes while you listen.</p>
            </div>
          )}
          <NotebookLMModal
            show={showNotebookLMModal}
            sources={sources}
            currentSource={currentSource}
            defaultStep={notebookLMStep}
            onConfirmNotebookLM={handleConfirmNotebookLM}
            onSaveUrl={handleSaveNotebookLMUrl}
            onLinkSource={handleLinkSource}
            onClose={() => setShowNotebookLMModal(false)}
          />
        </div>
      );
    });

    // Library View Component
    function LibraryView({ sources, notes, setCurrentSource, openSourceWithNotes, deleteNote, deleteSource, updateSource, setSources, setNotes, showToast }) {
      const [searchQuery, setSearchQuery] = React.useState('');
      const [searchOpen, setSearchOpen] = React.useState(false);
      const searchInputRef = React.useRef(null);

      const toggleSearch = () => {
        if (searchOpen) {
          setSearchQuery('');
          setSearchOpen(false);
        } else {
          setSearchOpen(true);
          setTimeout(() => searchInputRef.current && searchInputRef.current.focus(), 50);
        }
      };

      const filteredSources = searchQuery.trim()
        ? sources.filter(source => {
            const q = searchQuery.toLowerCase();
            if (source.title && source.title.toLowerCase().includes(q)) return true;
            return notes.some(n => n.sourceId === source.id && n.text && n.text.toLowerCase().includes(q));
          })
        : sources;

      const groupedSources = filteredSources.reduce((acc, source) => {
        const date = new Date(source.createdAt).toDateString();
        if (!acc[date]) acc[date] = [];
        acc[date].push(source);
        return acc;
      }, {});

      const getNotesForSource = (sourceId) => notes.filter(n => n.sourceId === sourceId).sort((a, b) => {
        if (a.timestamp !== undefined && b.timestamp !== undefined) return a.timestamp - b.timestamp;
        if (a.position !== undefined && b.position !== undefined) return a.position - b.position;
        return new Date(a.createdAt) - new Date(b.createdAt);
      });

      const exportToOneNote = () => {
        const getFirstThreeWords = (text) => {
          if (!text) return '';
          const words = text.trim().split(/\s+/).slice(0, 3);
          return words.join(' ');
        };

        let exportText = '';
        let firstSource = true;

        Object.entries(groupedSources).forEach(([date, dateSources]) => {
          dateSources.forEach(source => {
            const sourceNotes = getNotesForSource(source.id);

            // Add blank line between sources (except before first)
            if (!firstSource) {
              exportText += '\n';
            }
            firstSource = false;

            exportText += `${formatSourceHeader(source)}\n`;

            if (sourceNotes.length > 0) {
              exportText += 'Notes:\n';
              sourceNotes.forEach(note => {
                let notePrefix = '';
                if (note.timestamp !== undefined) {
                  notePrefix = `[${formatTime(note.timestamp)}] `;
                } else if (note.position !== undefined && note.context) {
                  const sentenceLabel = note.fullSentenceCaptured
                    ? `"${note.context}"`
                    : `"${getFirstThreeWords(note.context)}..."`;
                  notePrefix = `[Sentence ${note.position + 1} ${sentenceLabel}] `;
                }
                exportText += `- ${notePrefix}${note.text}\n`;
              });
            }
          });
        });

        navigator.clipboard.writeText(exportText);
      };

      const exportLibrary = () => {
        // Include saved positions for articles/PDFs and media
        const readerPositions = HJStore.get('positions') || {};
        const mediaPositions = HJStore.get('media_positions') || {};

        // Strip sentences arrays from sources to reduce export size
        const cleanSources = sources.map(({ sentences, ...rest }) => rest);

        const exportData = {
          version: 2,
          exportedAt: new Date().toISOString(),
          sources: cleanSources,
          notes: notes,
          positions: {
            reader: readerPositions,
            media: mediaPositions
          }
        };

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const localDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        a.download = `harkenjot-library-${localDate}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Library exported');
      };

      const importLibrary = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const data = JSON.parse(event.target.result);

              if (!data.sources || !data.notes) {
                showToast('Invalid library file');
                return;
              }

              // Check if this is a single-source export (additive import)
              if (data.exportType === 'single-source') {
                const sourceTitle = data.sources[0]?.title || 'source';
                if (!confirm(`Add "${sourceTitle}" and ${data.notes.length} notes to your library? This will not overwrite existing items.`)) {
                  return;
                }

                // Additive import: merge with existing data
                const now = new Date().toISOString();
                setSources(prevSources => {
                  // Check if source already exists (by id)
                  const existingIds = new Set(prevSources.map(s => s.id));
                  // Update addedAt to current date so imports appear at top of library
                  const newSources = data.sources
                    .filter(s => !existingIds.has(s.id))
                    .map(s => ({ ...s, addedAt: now }));
                  return [...newSources, ...prevSources];
                });

                setNotes(prevNotes => {
                  // Check if notes already exist (by id)
                  const existingIds = new Set(prevNotes.map(n => n.id));
                  const newNotes = data.notes.filter(n => !existingIds.has(n.id));
                  return [...prevNotes, ...newNotes];
                });

                const addedSources = data.sources.length;
                const addedNotes = data.notes.length;
                showToast(`Added ${addedSources} source${addedSources !== 1 ? 's' : ''} and ${addedNotes} note${addedNotes !== 1 ? 's' : ''} to library`);
              } else {
                // Full library import (replaces everything)
                if (!confirm(`Import ${data.sources.length} sources and ${data.notes.length} notes? This will replace your current library.`)) {
                  return;
                }

                setSources(data.sources);
                setNotes(data.notes);

                // Restore saved positions if available (version 2+)
                if (data.positions) {
                  if (data.positions.reader) {
                    HJStore.set('positions', data.positions.reader).catch(() => {});
                  }
                  if (data.positions.media) {
                    HJStore.set('media_positions', data.positions.media).catch(() => {});
                  }
                }

                showToast(`Imported ${data.sources.length} sources and ${data.notes.length} notes`);
              }
            } catch (err) {
              showToast('Failed to import library');
            }
          };
          reader.readAsText(file);
        };
        input.click();
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'hidden' }}>
          <div className="library-actions">
            {searchOpen && (
              <input
                ref={searchInputRef}
                type="text"
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                onKeyDown={e => e.key === 'Escape' && toggleSearch()}
                placeholder="Search titles & notes…"
                style={{
                  flex: '1 1 160px',
                  minWidth: 0,
                  padding: '0.4rem 0.6rem',
                  border: '1px solid var(--border)',
                  borderRadius: '6px',
                  background: 'var(--bg-secondary)',
                  color: 'var(--text-primary)',
                  fontSize: '0.85rem',
                  outline: 'none',
                }}
              />
            )}
            <button
              className={`btn btn-secondary${searchOpen ? ' active' : ''}`}
              onClick={toggleSearch}
              title={searchOpen ? 'Close search' : 'Search library'}
              style={searchOpen ? { color: 'var(--accent)', borderColor: 'var(--accent)' } : {}}
            >
              <Icons.Search />
            </button>
            <button className="btn btn-secondary" onClick={exportToOneNote}>
              <Icons.Copy /> Copy All
            </button>
            <button className="btn btn-secondary" onClick={importLibrary} title="Import Library">
              <Icons.FolderDown /> Import All
            </button>
            <button className="btn btn-secondary" onClick={exportLibrary} title="Export Library">
              <Icons.FolderUp /> Export All
            </button>
          </div>

          {sources.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">📚</div>
              <h3>Library Empty</h3>
              <p>Your sources and notes will appear here. Start by adding an article or podcast in the Reader or Player tabs.</p>
            </div>
          ) : filteredSources.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">🔍</div>
              <h3>No results</h3>
              <p>No sources or notes match "{searchQuery}".</p>
            </div>
          ) : (
            <div className="library-grid" style={{ flex: 1, overflow: 'auto' }}>
              {Object.entries(groupedSources).map(([date, dateSources]) => (
                <div key={date} className="library-date-group">
                  <div className="date-header">{formatDate(new Date(date))}</div>
                  {dateSources.map(source => (
                    <div
                      key={source.id}
                      className="library-item"
                      onClick={() => setCurrentSource(source)}
                    >
                      <div className="library-item-top">
                        <div className="library-item-title">{source.title}</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', flexShrink: 0 }}>
                          <div
                            className={`read-status clickable ${source.isRead ? 'checked' : ''}`}
                            onClick={(e) => {
                              e.stopPropagation();
                              updateSource(source.id, { isRead: !source.isRead });
                            }}
                            title={source.isRead ? 'Mark as unread' : 'Mark as read'}
                          >
                            {source.isRead && <Icons.Check />}
                          </div>
                          <div
                            className="note-count"
                            onClick={(e) => {
                              e.stopPropagation();
                              openSourceWithNotes(source);
                            }}
                            style={{ cursor: 'pointer' }}
                            title="Open source and view notes"
                          >
                            {getNotesForSource(source.id).length}× <Icons.Pencil />
                          </div>
                          <button
                            className="note-action-btn delete"
                            onClick={(e) => {
                              e.stopPropagation();
                              if (confirm('Delete this item and all its notes?')) {
                                deleteSource(source.id);
                              }
                            }}
                            title="Delete item"
                          >
                            <Icons.Trash />
                          </button>
                        </div>
                      </div>
                      <div className="library-item-meta">
                        <span className={`library-item-type ${source.type}`}>{source.type}</span>
                        {source.type === 'podcast' && (source.showName ? ((source.link || source.url) ? <a href={source.link || source.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="library-item-meta-name" style={{ color: 'var(--accent)', textDecoration: 'none' }}>{source.showName}</a> : <span className="library-item-meta-name">{source.showName}</span>) : (source.isNotebookLM || (source.title || '').toLowerCase().includes('notebooklm')) && <a href={source.notebookLMUrl || 'https://notebooklm.google.com/'} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="library-item-meta-name" style={{ color: 'var(--accent)', textDecoration: 'none' }}>{source.notebookLMUrl ? 'NotebookLM ↗' : 'NotebookLM'}</a>)}
                        {source.type === 'youtube' && source.channelName && (source.url ? <a href={source.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="library-item-meta-name" style={{ color: 'var(--accent)', textDecoration: 'none' }}>{source.channelName}</a> : <span className="library-item-meta-name">{source.channelName}</span>)}
                        {source.type === 'xvideo' && source.channelName && (source.url ? <a href={source.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="library-item-meta-name" style={{ color: 'var(--accent)', textDecoration: 'none' }}>@{source.channelName}</a> : <span className="library-item-meta-name">@{source.channelName}</span>)}
                        {source.type !== 'podcast' && source.type !== 'youtube' && source.type !== 'xvideo' && source.url && <a href={source.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="library-item-meta-name" style={{ color: 'var(--accent)', textDecoration: 'none' }}>{safeHostname(source.url)}</a>}
                        {(source.type === 'podcast' || source.type === 'youtube' || source.type === 'xvideo') && <span style={{ flexShrink: 0 }}>{source.duration ? formatTime(source.duration) : ''}</span>}
                        {(source.type === 'article' || source.type === 'pdf') && source.content && <span style={{ flexShrink: 0 }}>{(source.content.match(/[^.!?]+[.!?]+/g) || [source.content]).length} sentences</span>}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Note Sidebar Component
    function NoteSidebar({ notes, currentSource, deleteNote, updateNote, navigateToNote, showToast, onClose }) {
      const [editingNoteId, setEditingNoteId] = useState(null);
      const [editText, setEditText] = useState('');

      const startEdit = (note) => {
        setEditingNoteId(note.id);
        setEditText(note.text);
      };

      const cancelEdit = () => {
        setEditingNoteId(null);
        setEditText('');
      };

      const saveEdit = (noteId) => {
        if (editText.trim()) {
          updateNote(noteId, editText.trim());
          setEditingNoteId(null);
          setEditText('');
        }
      };

      const copyNote = (note) => {
        const getFirstThreeWords = (text) => {
          if (!text) return '';
          const words = text.trim().split(/\s+/).slice(0, 3);
          return words.join(' ');
        };

        let notePrefix = '';
        if (note.timestamp !== undefined) {
          notePrefix = `[${formatTime(note.timestamp)}] `;
        } else if (note.position !== undefined && note.context) {
          const sentenceLabel = note.fullSentenceCaptured
            ? `"${note.context}"`
            : `"${getFirstThreeWords(note.context)}..."`;
          notePrefix = `[Sentence ${note.position + 1} ${sentenceLabel}] `;
        }

        const noteText = `${formatSourceHeader(currentSource)}\nNotes:\n- ${notePrefix}${note.text}`;
        navigator.clipboard.writeText(noteText);
        showToast('Note copied to clipboard');
      };

      const exportAllNotes = () => {
        if (!currentSource) return;

        const getFirstThreeWords = (text) => {
          if (!text) return '';
          const words = text.trim().split(/\s+/).slice(0, 3);
          return words.join(' ');
        };

        let exportText = formatSourceHeader(currentSource);

        if (notes.length > 0) {
          exportText += `\nNotes:\n`;
          notes.forEach(note => {
            let notePrefix = '';
            if (note.timestamp !== undefined) {
              notePrefix = `[${formatTime(note.timestamp)}] `;
            } else if (note.position !== undefined && note.context) {
              const sentenceLabel = note.fullSentenceCaptured
                ? `"${note.context}"`
                : `"${getFirstThreeWords(note.context)}..."`;
              notePrefix = `[Sentence ${note.position + 1} ${sentenceLabel}] `;
            }
            exportText += `- ${notePrefix}${note.text}\n`;
          });
        }

        navigator.clipboard.writeText(exportText);
        showToast(notes.length > 0 ? 'All notes copied to clipboard' : 'Title and link copied to clipboard');
      };

      const exportCurrentSource = () => {
        if (!currentSource) return;

        // Strip sentences array from source to reduce export size
        const { sentences: _, ...cleanSource } = currentSource;

        const exportData = {
          version: 2,
          exportType: 'single-source',
          exportedAt: new Date().toISOString(),
          sources: [cleanSource],
          notes: notes
        };

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const localDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        // Sanitize title for filename
        const safeTitle = (currentSource.title || 'source').replace(/[^a-zA-Z0-9]/g, '-').substring(0, 30);
        a.download = `harkenjot-${safeTitle}-${localDate}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Source and notes exported');
      };

      return (
        <div>
          <div className="sidebar-title" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span><Icons.Pencil /> Notes ({notes.length})</span>
            {onClose && (
              <button
                onClick={onClose}
                className="btn btn-secondary btn-icon"
                style={{ width: '32px', height: '32px', padding: 0 }}
              >
                <Icons.X />
              </button>
            )}
          </div>

          <div className="export-section" style={{ marginTop: '0.5rem', marginBottom: '0.5rem', borderTop: 'none', display: 'flex', gap: '0.5rem' }}>
            <button className="export-btn" onClick={exportAllNotes} style={{ flex: 1 }}>
              <Icons.Copy /> Copy
            </button>
            <button className="export-btn" onClick={exportCurrentSource} style={{ flex: 1 }}>
              <Icons.FolderUp /> Export
            </button>
          </div>

          {notes.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '2rem 1rem', color: 'var(--text-muted)' }}>
              <Icons.Mic />
              <p style={{ marginTop: '0.5rem', fontSize: '0.875rem' }}>
                Click "Voice" or "Type" while listening to take notes.
              </p>
            </div>
          ) : (
            <div className="notes-list">
              {notes.map(note => (
                <div key={note.id} className="note-card">
                  <div
                    className="note-position"
                    onClick={() => navigateToNote(note)}
                    style={{ cursor: 'pointer' }}
                    title="Click to navigate to this location"
                  >
                    {note.timestamp !== undefined
                      ? formatTime(note.timestamp)
                      : `Sentence ${note.position + 1}`}
                  </div>

                  {editingNoteId === note.id ? (
                    // Edit mode
                    <>
                      <textarea
                        className="note-edit-input"
                        value={editText}
                        onChange={(e) => setEditText(e.target.value)}
                        autoFocus
                        rows="4"
                      />
                      <div className="note-actions">
                        <button className="note-action-btn" onClick={() => saveEdit(note.id)}>
                          Save
                        </button>
                        <button className="note-action-btn" onClick={cancelEdit}>
                          Cancel
                        </button>
                      </div>
                    </>
                  ) : (
                    // View mode
                    <>
                      <div className="note-text">{note.text}</div>
                      {note.context && (
                        <div className="note-context">"{note.context}"</div>
                      )}
                      <div className="note-actions">
                        <button className="note-action-btn" onClick={() => startEdit(note)}>
                          <Icons.Edit /> Edit
                        </button>
                        <button className="note-action-btn" onClick={() => copyNote(note)}>
                          <Icons.Copy /> Copy
                        </button>
                        <button className="note-action-btn delete" onClick={() => deleteNote(note.id)}>
                          <Icons.Trash /> Delete
                        </button>
                      </div>
                    </>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Render the app — wait for HJStore to hydrate from IndexedDB (and migrate
    // from localStorage on first run) so App's useState initializers see the
    // restored data instead of an empty cache.
    HJStore.init().finally(() => {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    });
  </script>
</body>
</html>
